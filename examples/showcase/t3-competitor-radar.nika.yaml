# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T3 fan-out · strategy / product marketing
#
# Monday 8am · everything your competitor shipped last week, read in
# parallel, digested into one brief on your desk. N pages is decided at
# RUNTIME by their sitemap, not hardcoded.
#
# Demonstrates ·
#   - `for_each` over a runtime collection · the matrix / fan-out pattern
#   - `max_parallel: 4` + `fail_fast: false` · bounded, resilient crawling
#   - `retry:` + `timeout:` · per-iteration resilience (flaky web is normal)
#   - the fan-in · `${{ tasks.pages.output }}` is the ARRAY of page summaries
#
# Needs · a REAL sitemap URL (--var competitor_sitemap=…) + TEAM_WEBHOOK_URL.
#
# Run · nika run examples/showcase/t3-competitor-radar.nika.yaml

nika: v1
workflow:
  id: competitor-radar
  description: "Sitemap → parallel page reads → one competitive brief + ping"

model: ollama/qwen3.5:4b   # local · zero key · swap for anthropic/claude-sonnet-4-6

const:
  competitor_sitemap: "https://competitor.example.com/sitemap.xml"

secrets:
  team_webhook:
    source: env
    key: TEAM_WEBHOOK_URL
    egress:                       # sanction the one send · the secret IS the URL
      - to: "nika:notify"
        host_from_self: true

tasks:
  map:
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ const.competitor_sitemap }}"
        mode: sitemap
    output:
      recent: ".[:8] | map(.loc)"     # sitemap = the root array of {loc, …} · cap at 8, keep the URLs

  pages:
    with:
      map_recent: ${{ tasks.map.recent }}
    for_each: ${{ with.map_recent }}
    max_parallel: 4                    # be polite · 4 fetches in flight max
    fail_fast: false                   # one dead page must not kill the radar
    on_error:
      recover: null                    # a dead page yields null at its index · the radar lives
    timeout: "30s"
    retry:
      max_attempts: 3
      backoff_strategy: exponential
      jitter: true
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ item }}"
        mode: article

  digest:
    with:
      pages: ${{ tasks.pages.output }}
    infer:
      prompt: |
        These are the pages a competitor published recently ·
        ${{ with.pages }}
        Write the Monday brief · what they shipped · what it signals ·
        what we should watch. One page, plain words.

  save:
    with:
      digest: ${{ tasks.digest.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./radar/competitor-brief.md"
        content: "${{ with.digest }}"
        create_dirs: true

  ping:
    after:
      save: success
    invoke:
      tool: "nika:notify"
      args:
        channel: webhook
        target: "${{ secrets.team_webhook }}"
        message: "Competitor radar is ready · ./radar/competitor-brief.md"
        severity: info

outputs:
  brief: ${{ tasks.digest.output }}
