# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · customer support
#
# The overnight ticket queue, triaged before coffee · every ticket
# classified + a first reply drafted, the urgent ones escalated to a
# webhook, the full board written to disk under a batch id.
#
# Demonstrates ·
#   - `nika:uuid` · v7 batch ids: sortable, timestamped, no collisions
#   - `infer.schema:` over a LIST · classify the whole queue in one typed call
#   - `nika:jq` post-filter · urgency slicing WITHOUT another model call
#   - conditional `notify` · the escalation fires only when needed
#
# Needs · ./support/overnight-queue.json (your ticket export).
#
# Run · nika run examples/showcase/t2-support-triage.nika.yaml

nika: v1
workflow:
  id: support-triage
  description: "Ticket queue → typed triage → urgent escalation → triage board"

model: ollama/qwen3.5:4b   # local · zero key · swap for groq/llama-3.3-70b (triage wants speed)

vars:
  queue_path: "./support/overnight-queue.json"

secrets:
  oncall_webhook:
    source: env
    key: ONCALL_WEBHOOK_URL
    egress:                       # sanction the one send · the secret IS the URL
      - to: "nika:notify"
        host_from_self: true

tasks:
  batch:
    invoke:
      tool: "nika:uuid"
      args: { version: v7 }

  queue:
    invoke:
      tool: "nika:read"
      args: { path: "${{ vars.queue_path }}" }

  triage:
    depends_on: [queue]
    infer:
      prompt: |
        Triage every ticket in this queue ·
        ${{ tasks.queue.output }}
        For each · classify category and urgency, draft a 2-sentence first reply.
      schema:
        type: object
        required: [tickets]
        properties:
          tickets:
            type: array
            items:
              type: object
              required: [id, category, urgency, first_reply]
              properties:
                id: { type: string }
                category: { type: string, enum: [billing, bug, how-to, account, other] }
                urgency: { type: string, enum: [low, normal, high, critical] }
                first_reply: { type: string }

  urgent:
    depends_on: [triage]
    invoke:
      tool: "nika:jq"
      args:
        input: "${{ tasks.triage.output.tickets }}"
        expression: 'map(select(.urgency == "high" or .urgency == "critical"))'

  escalate:
    depends_on: [urgent, batch]
    when: ${{ size(tasks.urgent.output) > 0 }}
    invoke:
      tool: "nika:notify"
      args:
        channel: webhook
        target: "${{ secrets.oncall_webhook }}"
        message: "Urgent tickets in triage batch ${{ tasks.batch.output }} · ${{ tasks.urgent.output }}"
        severity: warning

  board:
    depends_on: [triage, batch]
    invoke:
      tool: "nika:write"
      args:
        path: "./support/triage-${{ tasks.batch.output }}.json"
        content: "${{ tasks.triage.output.tickets }}"

outputs:
  tickets:
    value: ${{ tasks.triage.output.tickets }}
    type: array
    description: "The classified queue with drafted first replies"
