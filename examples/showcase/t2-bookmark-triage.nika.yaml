# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 fan-out · the bookmark backlog
#
# A pile of saved URLs becomes one triage table: fetch each page's
# metadata (title · description), fold the survivors into a markdown
# table, note the dead links — without a single page's failure killing
# the batch. The resilient fan-out every real crawl needs.
#
# Demonstrates ·
#   - `nika:fetch` `mode: metadata` · the page's OG/meta head as typed
#     JSON, not scraped HTML (the mode nobody shows off)
#   - resilient fan-out · `for_each` + `fail_fast: false` +
#     `on_error: recover:` — a dead URL yields a marker row instead of
#     an exception (bad links are DATA, the etl-quarantine law)
#   - the fan-in · one jq fold separates live rows from dead ones and
#     renders the table · zero model on the whole path
#
# Run · nika run examples/showcase/t2-bookmark-triage.nika.yaml

nika: v1
workflow:
  id: bookmark-triage
  description: "URL list → per-page metadata fan-out (dead links survive) → one markdown triage table"

const:
  bookmarks:
    type: array
    default:
      - "https://example.com"
      - "https://github.com/supernovae-st/nika"
      - "https://this-domain-does-not-exist-0000.invalid" # the dead one · the recover path IS the demo
    description: "The saved-links pile to triage"

permits:
  exec: false
  net:
    http: ["example.com", "github.com", "this-domain-does-not-exist-0000.invalid"]
  fs:
    write: ["out/**"]
  tools: ["nika:fetch", "nika:jq", "nika:write"]

tasks:
  # The fan-out · one metadata fetch per URL · a dead link recovers to a
  # marker object (the batch NEVER dies at bookmark 14).
  pages:
    for_each: ${{ const.bookmarks }}
    max_parallel: 3
    fail_fast: false
    retry: { max_attempts: 2, backoff_ms: 500 } # a transient blip retries BEFORE the dead verdict
    on_error:
      recover: { dead: true } # a YAML value, not a JSON string — the marker row
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ item }}"
        mode: metadata

  # The fan-in · zip results back to their URLs · split live from dead.
  table:
    with:
      pages: ${{ tasks.pages.output }}
    invoke:
      tool: "nika:jq"
      args:
        input:
          urls: ${{ const.bookmarks }}
          pages: ${{ with.pages }}
        expression: >-
          def esc: tostring | gsub("\\|"; "\\|") | gsub("\n"; " ");
          ([.urls, .pages] | transpose | map({ url: .[0], page: .[1] })) as $rows |
          {
            live: ([$rows[] | select(.page.dead != true) |
              "| \(.url) | \(.page.title // "—" | esc) | \((.page.description // "—" | esc) | .[0:80]) |"] | join("\n")),
            dead: ([$rows[] | select(.page.dead == true) | "| \(.url) | DEAD | link rot |"] | join("\n"))
          }

  report:
    with:
      table_live: ${{ tasks.table.output.live }}
      table_dead: ${{ tasks.table.output.dead }}
    invoke:
      tool: "nika:write"
      args:
        path: out/bookmarks.md
        create_dirs: true
        content: |
          # Bookmark triage

          | url | title | description |
          | --- | --- | --- |
          ${{ with.table_live }}
          ${{ with.table_dead }}

          *Generated by [nika](https://nika.sh) — dead links survived the batch (`on_error: recover:`).*

outputs:
  table:
    value: ${{ tasks.table.output }}
    description: "Live rows + dead rows · the triage split"
