# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · finance / freelance
#
# Friday ritual, automated · the invoice ledger is filtered for overdue
# rows, polite reminders are drafted, and NOTHING goes out until a
# human says yes. The approval gate is three lines.
#
# Demonstrates ·
#   - `nika:convert` · CSV → JSON, one builtin, `from:`/`to:`
#   - `nika:jq` · THE data language: filter rows, no LLM needed for data work
#   - `size(...)` CEL · the canonical empty-check gates the whole tail
#   - `nika:prompt` · the human-in-the-loop gate (blocks until answered)
#
# Needs · ./finance/invoices.csv (your export · columns incl. status,due).
#
# Run · nika run examples/showcase/t2-invoice-chaser.nika.yaml

nika: v1
workflow:
  id: invoice-chaser
  description: "Ledger CSV → overdue filter → drafted reminders → human gate → drafts file"

model: ollama/qwen3.5:4b   # local · zero key · swap for groq/llama-3.3-70b (drafting is a fast-model job)

const:
  ledger_csv: "./finance/invoices.csv"
permits:
  tools: ["nika:convert", "nika:jq", "nika:prompt", "nika:read", "nika:write"]
  fs: { write: ["./finance/reminders-to-send.md"] }

tasks:
  ledger:
    invoke:
      tool: "nika:read"
      args: { path: "${{ const.ledger_csv }}" }

  rows:
    with:
      csv: ${{ tasks.ledger.output }}
    invoke:
      tool: "nika:convert"
      args:
        input: "${{ with.csv }}"
        from: csv
        to: json
        has_header: true

  overdue:
    with:
      rows: ${{ tasks.rows.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: "${{ with.rows }}"
        expression: 'map(select(.status == "overdue"))'

  drafts:
    with:
      overdue: ${{ tasks.overdue.output }}
    when: ${{ size(with.overdue) > 0 }}
    infer:
      prompt: |
        Draft one short, polite payment reminder per overdue invoice ·
        ${{ with.overdue }}
        Markdown · one section per client · firm but warm.

  approve:
    with:
      drafts: ${{ tasks.drafts.output }}
    when: ${{ with.drafts != null }}   # nothing drafted · nothing to approve
    invoke:
      tool: "nika:prompt"
      args:
        message: "Save the reminder drafts for sending?"
        default: false

  save:
    with:
      drafts: ${{ tasks.drafts.output }}
      approved: ${{ tasks.approve.output }}
    when: ${{ with.drafts != null && with.approved == true }}   # zero overdue → drafts skipped (null) · don't write nothing
    invoke:
      tool: "nika:write"
      args:
        path: "./finance/reminders-to-send.md"
        content: "${{ with.drafts }}"

outputs:
  overdue:
    value: ${{ tasks.overdue.output }}
    description: "The overdue rows the reminders were drafted for"
