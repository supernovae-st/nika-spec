# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · finance / freelance
#
# Friday ritual, automated · the invoice ledger is filtered for overdue
# rows, polite reminders are drafted — and NOTHING goes out until a
# human says yes. The approval gate is three lines.
#
# Demonstrates ·
#   - `nika:convert` · CSV → JSON, one builtin, `from:`/`to:`
#   - `nika:jq` · THE data language — filter rows, no LLM needed for data work
#   - `size(...)` CEL · the canonical empty-check gates the whole tail
#   - `nika:prompt` · the human-in-the-loop gate (blocks until answered)
#
# Run · nika run examples/showcase/t2-invoice-chaser.nika.yaml
nika: v1
workflow: invoice-chaser
description: "Ledger CSV → overdue filter → drafted reminders → human gate → drafts file"

model: mock/echo            # swap for groq/llama-3.3-70b — drafting is a fast-model job

vars:
  ledger_csv: "./finance/invoices.csv"

tasks:
  - id: ledger
    invoke:
      tool: "nika:read"
      args: { path: "${{ vars.ledger_csv }}" }

  - id: rows
    depends_on: [ledger]
    invoke:
      tool: "nika:convert"
      args:
        input: "${{ tasks.ledger.output }}"
        from: csv
        to: json
        has_header: true

  - id: overdue
    depends_on: [rows]
    invoke:
      tool: "nika:jq"
      args:
        input: "${{ tasks.rows.output }}"
        expression: 'map(select(.status == "overdue"))'

  - id: drafts
    depends_on: [overdue]
    when: ${{ size(tasks.overdue.output) > 0 }}
    infer:
      prompt: |
        Draft one short, polite payment reminder per overdue invoice ·
        ${{ tasks.overdue.output }}
        Markdown · one section per client · firm but warm.

  - id: approve
    depends_on: [drafts]
    when: ${{ tasks.drafts.output != null }}   # nothing drafted · nothing to approve
    invoke:
      tool: "nika:prompt"
      args:
        message: "Save the reminder drafts for sending?"
        default: false

  - id: save
    depends_on: [approve, drafts]
    when: ${{ tasks.drafts.output != null && tasks.approve.output == true }}   # zero overdue → drafts skipped (null) · don't write nothing
    invoke:
      tool: "nika:write"
      args:
        path: "./finance/reminders-to-send.md"
        content: "${{ tasks.drafts.output }}"

outputs:
  overdue:
    value: ${{ tasks.overdue.output }}
    type: array
    description: "The overdue rows the reminders were drafted for"
