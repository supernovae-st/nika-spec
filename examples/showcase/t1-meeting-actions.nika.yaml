# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T1 starter · every office job
#
# A meeting transcript goes in. Owners, tasks and deadlines come out:
# as typed JSON your task tracker can actually import.
#
# Demonstrates ·
#   - typed `vars:` · `transcript_path` is required · the engine validates inputs
#   - `infer.schema:` · structured output: the model MUST return this shape
#   - `${{ tasks.X.output.actions }}` · indexing into a schema-validated object
#   - `nika:log` · human-readable diagnostics on the event stream
#
# Run · nika run examples/showcase/t1-meeting-actions.nika.yaml
nika: v1
workflow: meeting-actions
description: "Transcript → typed action items {owner, task, due}"

model: ollama/llama3.2:3b   # local · zero key · swap for openai/gpt-5.2 or any provider in the catalog

vars:
  transcript_path:
    type: string
    required: true
    description: "Path to the raw meeting transcript"

tasks:
  - id: transcript
    invoke:
      tool: "nika:read"
      args: { path: "${{ vars.transcript_path }}" }

  - id: extract
    depends_on: [transcript]
    infer:
      prompt: |
        Extract every action item from this meeting transcript ·
        ${{ tasks.transcript.output }}
      schema:                          # the contract the model must satisfy
        type: object
        required: [actions]
        properties:
          actions:
            type: array
            items:
              type: object
              required: [owner, task]
              properties:
                owner: { type: string }
                task: { type: string }
                due: { type: string }

  - id: save
    depends_on: [extract]
    invoke:
      tool: "nika:write"
      args:
        path: "./action-items.json"
        content: "${{ tasks.extract.output.actions }}"

  - id: trace
    depends_on: [extract]
    invoke:
      tool: "nika:log"
      args:
        level: info
        message: "Action items extracted to ./action-items.json"

outputs:
  actions:
    value: ${{ tasks.extract.output.actions }}
    type: array
    description: "Typed action items, tracker-ready"
