# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T1 starter · e-commerce / personal
#
# A price-drop alert in ~20 lines, and ZERO model calls. Not every
# workflow needs an LLM · the DAG, the tools and one CEL comparison
# do the whole job deterministically.
#
# Demonstrates ·
#   - `nika:fetch` with `mode: jq` · pull ONE structured field from an API
#   - `output:` · named jq bindings → `${{ tasks.check.price }}`
#   - `with:` + `when:` · the price crosses as a value edge, one CEL
#     comparison gates the alert task
#   - `secrets:` · the webhook URL is vault/env-backed, masked in logs
#
# Run · nika run examples/showcase/t1-price-watch.nika.yaml
# Runs green offline · the placeholder API resolves nowhere, the sample
# price takes over ABOVE the target, so the gate stays closed and the
# skip is the lesson. Point `product_api` at your endpoint + export
# ALERTS_WEBHOOK_URL to see it fire.

nika: v1
workflow:
  id: price-watch
  description: "Watch a product price, ping me when it drops below my target"

vars:
  product_api: "https://api.shop.example.com/v1/products/macbook-air"
  alert_below: 899

secrets:
  alerts_webhook:
    source: env
    key: ALERTS_WEBHOOK_URL
    egress:                       # sanction the one send · the secret IS the URL
      - to: "nika:notify"
        host_from_self: true

tasks:
  check:
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ vars.product_api }}"
        mode: jq
        jq: "."
    output:                           # named jq bindings over the raw response
      price: ".price"
      name: ".name"
    on_error:
      # Offline rehearsal · a sample ABOVE the target — the gate below
      # stays closed and the dry run ends green with the alert skipped.
      recover: { price: 949, name: "MacBook Air (offline sample)" }

  alert:
    with:
      price: ${{ tasks.check.price }}     # value edges · the named bindings cross the boundary here
      name: ${{ tasks.check.name }}
    when: ${{ with.price < vars.alert_below }}
    invoke:
      tool: "nika:notify"
      args:
        channel: webhook
        target: "${{ secrets.alerts_webhook }}"
        message: "Price drop · ${{ with.name }} is now ${{ with.price }} (target ${{ vars.alert_below }})"
        severity: info

outputs:
  price: ${{ tasks.check.price }}
