# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · legal / compliance
#
# A contract review where the contract NEVER leaves the machine · the
# model is local (ollama), the clause extraction is schema-typed, and a
# validate + assert pair refuses to ship a memo built on bad data.
#
# Demonstrates ·
#   - sovereignty · `model: ollama/qwen3.5:4b`: sensitive docs stay local
#   - `nika:validate` · re-check the extraction against a stricter schema
#   - `nika:assert` · the fail-fast guard (vs `when:` · the skip-guard)
#   - `after: success` · the memo is control-gated on the assert
#   - belt-and-braces · schema at infer time + validate + assert downstream
#
# Run · nika run examples/showcase/t2-contract-guard.nika.yaml --var contract_path=./contract.md

nika: v1
workflow:
  id: contract-guard
  description: "Local-model clause extraction → schema gate → risk memo"

model: ollama/qwen3.5:4b   # the whole review runs offline · zero cloud

inputs:
  contract_path:
    type: string
    required: true
    description: "Path to the contract (markdown or plain text)"

tasks:
  contract:
    invoke:
      tool: "nika:read"
      args: { path: "${{ inputs.contract_path }}" }

  clauses:
    with:
      contract: ${{ tasks.contract.output }}
    infer:
      prompt: |
        Extract every risk-bearing clause from this contract ·
        ${{ with.contract }}
        Quote each clause verbatim · classify its risk.
      schema:
        type: object
        required: [clauses]
        properties:
          clauses:
            type: array
            items:
              type: object
              required: [quote, type, risk]
              properties:
                quote: { type: string }
                type: { type: string, enum: [liability, termination, ip, payment, data, other] }
                risk: { type: string, enum: [low, medium, high] }

  check:
    with:
      clauses: ${{ tasks.clauses.output }}
    invoke:
      tool: "nika:validate"
      args:
        data: "${{ with.clauses }}"
        format: json
        schema:
          type: object
          required: [clauses]
          properties:
            clauses:
              type: array
              minItems: 1

  gate:
    with:
      extraction_ok: ${{ tasks.check.output.valid == true }}   # the whole condition crosses as ONE boundary expression
    invoke:
      tool: "nika:assert"
      args:
        condition: "${{ with.extraction_ok }}"
        message: "Clause extraction failed the schema gate: refusing to write the memo"

  memo:
    with:
      clauses: ${{ tasks.clauses.output.clauses }}
    after:
      gate: success              # state, no data · the assert passed or the memo is cancelled
    infer:
      prompt: |
        Write a one-page risk memo from these clauses ·
        ${{ with.clauses }}
        Order by risk · high first · cite the quoted text.

  save:
    with:
      memo: ${{ tasks.memo.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./legal/risk-memo.md"
        content: "${{ with.memo }}"
        create_dirs: true

outputs:
  clauses:
    value: ${{ tasks.clauses.output.clauses }}
    description: "Typed risk-bearing clauses, verbatim quotes"
  memo: ${{ tasks.memo.output }}
