# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T3 fan-out · product / content / i18n
#
# Your whole docs folder, translated · glob finds the files, two fan-outs
# read + translate them in parallel, jq zips paths back to texts, and a
# final fan-out writes the mirror tree. Zero copy-paste, voice intact.
#
# Demonstrates ·
#   - `nika:glob` · the collection comes from the filesystem at runtime
#   - chained `for_each` stages · read-all → translate-all → write-all
#   - `nika:jq` `transpose` · zip two parallel arrays into [{path, text}]
#   - `${{ item.path }}` · loop-locals are objects too: field access works
#
# Run · nika run examples/showcase/t3-localization-factory.nika.yaml

nika: v1
workflow:
  id: localization-factory
  description: "glob docs → parallel read → parallel translate → mirror tree"

model: ollama/qwen3.5:4b   # local default · swap for mistral/mistral-large (EU model for EU locales)

vars:
  lang: "fr"
  source_glob: "./docs/**/*.md"

tasks:
  files:
    invoke:
      tool: "nika:glob"
      args:
        pattern: "${{ vars.source_glob }}"
        exclude: ["**/node_modules/**"]

  texts:
    with:
      files: ${{ tasks.files.output }}
    for_each: ${{ with.files }}
    max_parallel: 8
    invoke:
      tool: "nika:read"
      args: { path: "${{ item }}" }

  pairs:
    with:
      files: ${{ tasks.files.output }}
      texts: ${{ tasks.texts.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ["${{ with.files }}", "${{ with.texts }}"]
        expression: "transpose | map({path: .[0], text: .[1]})"

  translated:
    with:
      pairs: ${{ tasks.pairs.output }}
    for_each: ${{ with.pairs }}
    max_parallel: 3                    # rate-limit the provider
    fail_fast: false                   # finish the batch · a failed file yields null at its index
    on_error:
      recover: null                    # null keeps the transpose zip aligned (order preserved)
    infer:
      prompt: |
        Translate to ${{ vars.lang }} · keep markdown structure, code blocks
        untouched, and the original tone ·
        ${{ item.text }}

  bundle:
    with:
      pairs: ${{ tasks.pairs.output }}
      translated: ${{ tasks.translated.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ["${{ with.pairs }}", "${{ with.translated }}"]
        expression: "transpose | map(select(.[1] != null)) | map({path: .[0].path, text: .[1]})"

  mirror:
    with:
      bundle: ${{ tasks.bundle.output }}
    for_each: ${{ with.bundle }}
    max_parallel: 8
    invoke:
      tool: "nika:write"
      args:
        path: "./i18n/${{ vars.lang }}/${{ item.path }}"
        content: "${{ item.text }}"
        create_dirs: true

outputs:
  files:
    value: ${{ tasks.files.output }}
    type: array
    description: "Every source file that was mirrored"
