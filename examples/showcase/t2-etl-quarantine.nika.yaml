# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · data engineering
#
# The nightly ETL that never dies at row 14,203 · bad batches degrade
# to a quarantine file instead of killing the pipeline · `on_error:
# recover:` is the difference between « re-run the whole night » and
# « fix three rows tomorrow morning ».
#
# Demonstrates ·
#   - `on_error: recover:` · graceful degradation to a fallback value ·
#     the skipped branch reads as null: guard `size()` with `!= null`
#   - `nika:convert` CSV→JSON + `nika:validate` as the schema gate
#   - jq `group_by` aggregation · stats without a model call
#   - the quarantine pattern · bad data is DATA, not an exception
#
# Run · nika run examples/showcase/t2-etl-quarantine.nika.yaml

nika: v1
workflow:
  id: etl-quarantine
  description: "CSV batch → schema gate → quarantine the bad · aggregate the good"

vars:
  batch_csv: "./data/incoming/orders.csv"

tasks:
  # A deterministic empty fallback · the recover target when parsing dies.
  empty_batch:
    invoke:
      tool: "nika:jq"
      args: { input: [], expression: "." }

  raw:
    invoke:
      tool: "nika:read"
      args: { path: "${{ vars.batch_csv }}" }

  rows:
    depends_on: [raw]
    invoke:
      tool: "nika:convert"
      args:
        input: "${{ tasks.raw.output }}"
        from: csv
        to: json
        has_header: true
    on_error:
      recover: ${{ tasks.empty_batch.output }}    # malformed CSV → empty batch · pipeline lives

  check:
    depends_on: [rows]
    invoke:
      tool: "nika:validate"
      args:
        data: "${{ tasks.rows.output }}"
        format: json
        schema:
          type: array
          items:
            type: object
            required: [order_id, amount, currency]
            properties:
              order_id: { type: string }
              amount: { type: string }
              currency: { type: string, enum: [EUR, USD, GBP] }

  good:
    depends_on: [rows, check]
    when: ${{ tasks.check.output.valid == true }}
    invoke:
      tool: "nika:jq"
      args:
        input: "${{ tasks.rows.output }}"
        expression: 'group_by(.currency) | map({currency: .[0].currency, orders: length, total: (map(.amount | tonumber) | add)})'

  quarantine:
    depends_on: [rows, check]
    when: ${{ tasks.check.output.valid == false }}
    invoke:
      tool: "nika:write"
      args:
        path: "./data/quarantine/orders-rejected.json"
        content: "${{ tasks.check.output.errors }}"
        create_dirs: true

  report:
    depends_on: [good]
    when: ${{ tasks.good.output != null && size(tasks.good.output) > 0 }}   # good is SKIPPED (null) on the quarantine path · guard before size()
    invoke:
      tool: "nika:write"
      args:
        path: "./data/reports/daily-totals.json"
        content: "${{ tasks.good.output }}"
        create_dirs: true

outputs:
  # Deliberately untyped · on the quarantine path `good` is SKIPPED and
  # this is null — a declared `type: array` would refuse the branch the
  # file exists to demonstrate.
  totals: ${{ tasks.good.output }}
