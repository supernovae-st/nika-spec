# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · SEO / content marketing
#
# A competitor's sitemap goes in. A ready-to-write content brief comes
# out · title, angle, outline, keywords: grounded in what they actually
# published, not vibes.
#
# Demonstrates ·
#   - `mode: sitemap` then `mode: article` · two fetch extractions chained
#     (sitemap yields the ROOT ARRAY `[{loc, changefreq, priority}, …]`)
#   - `output:` jq · `.[:5] | map(.loc)`: slice the array, keep the URLs
#   - CEL indexing · `${{ tasks.map.top[0] }}` reaches into a binding
#   - `infer.schema:` · the brief is typed, not a blob
#     (mock/echo synthesizes schema-conformant output · offline-runnable)
#
# Needs · a REAL sitemap URL (--var competitor_sitemap=https://…/sitemap.xml
# — the placeholder domain resolves nowhere).
#
# Run · nika run examples/showcase/t2-seo-content-brief.nika.yaml --var topic="rust async runtimes"

nika: v1
workflow:
  id: seo-content-brief
  description: "Competitor sitemap → top page → gap analysis → typed brief"

model: ollama/qwen3.5:4b   # local · zero key · swap for openai/gpt-5.2

vars:
  competitor_sitemap: "https://competitor.example.com/sitemap.xml"
  topic:
    type: string
    required: true
    description: "The keyword/topic you want to rank for"

tasks:
  map:
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ vars.competitor_sitemap }}"
        mode: sitemap
    output:
      top: ".[:5] | map(.loc)"

  top_page:
    with:
      map_top: ${{ tasks.map.top[0] }}
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ with.map_top }}"
        mode: article

  brief:
    with:
      map_top: ${{ tasks.map.top }}
      top_page: ${{ tasks.top_page.output }}
    infer:
      prompt: |
        Topic to rank for · ${{ vars.topic }}
        Competitor's top URLs · ${{ with.map_top }}
        Their best page on it ·
        ${{ with.top_page }}

        Write a content brief that BEATS this page · find the gaps they
        missed · angle for search intent.
      schema:
        type: object
        required: [title, angle, outline, keywords]
        properties:
          title: { type: string }
          angle: { type: string }
          outline: { type: array, items: { type: string } }
          keywords: { type: array, items: { type: string } }

  save:
    with:
      brief: ${{ tasks.brief.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./briefs/${{ vars.topic }}.json"
        content: "${{ with.brief }}"
        create_dirs: true

outputs:
  brief:
    value: ${{ tasks.brief.output }}
    type: object
    description: "The typed content brief"
