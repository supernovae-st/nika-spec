# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# showcase · T2 chain · the meeting/podcast → show-notes job
#
# The repeated AI chore that lives in chat scrollbacks today: a raw
# transcript in, structured show-notes out — chapters, pull-quotes, a
# one-paragraph summary. One `infer:` with a `schema:` does the whole
# job: the model returns TYPED JSON (never freeform prose you re-parse),
# and `nika:write` renders it into a clean markdown page.
#
# Demonstrates ·
#   - `infer:` + `schema:` · a bounded model call that MUST return the
#     shape (chapters · quotes · summary) — the structured-output floor,
#     not « ask nicely and hope »
#   - a local model by default (zero key · the transcript never leaves
#     the machine) · swap the `model:` line for any provider
#   - typed JSON → markdown · the shape is the contract, the render is
#     mechanical (`nika:write`, no second model call)
#
# Needs · ./data/transcript.txt (your episode transcript).
#
# Run · point `vars.transcript` at your file, then
#   nika run examples/showcase/t2-transcript-shownotes.nika.yaml

nika: v1
workflow:
  id: transcript-shownotes
  description: "Raw transcript → typed show-notes (chapters · quotes · summary) · one bounded infer"

model: ollama/llama3.2:3b # local · zero key · deliberately NOT the qwen3.5 convention: a thinking model can burn max_tokens in its think block before the JSON (engine#428) — schema showcases pick a non-thinking model

vars:
  transcript: "./data/transcript.txt"

permits:
  exec: false
  fs:
    read: ["data/**"]
    write: ["out/**"]
  tools: ["nika:read", "nika:jq", "nika:write"]

tasks:
  raw:
    invoke:
      tool: "nika:read"
      args: { path: "${{ vars.transcript }}" }

  # ONE bounded model call · the schema is the contract, not a suggestion.
  notes:
    with:
      raw: ${{ tasks.raw.output }}
    infer:
      prompt: |
        Turn this transcript into show-notes. Ground every chapter title
        and quote in the text — invent nothing.

        Transcript ·
        ${{ with.raw }}
      max_tokens: 800
      schema:
        type: object
        additionalProperties: false # a deterministic shape across providers (the checker's strictness hint)
        required: [summary, chapters, quotes]
        properties:
          summary: { type: string }
          chapters:
            type: array
            items:
              type: object
              additionalProperties: false
              required: [title, gist]
              properties:
                title: { type: string }
                gist: { type: string }
          quotes:
            type: array
            items: { type: string }

  # Typed JSON → markdown lines · mechanical, zero second model call.
  sections:
    with:
      notes: ${{ tasks.notes.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: "${{ with.notes }}"
        expression: >-
          {
            chapters: (.chapters | map("- **\(.title)** — \(.gist)") | join("\n")),
            quotes: (.quotes | map("> \(.)") | join("\n\n"))
          }

  page:
    with:
      notes_summary: ${{ tasks.notes.output.summary }}
      sections_chapters: ${{ tasks.sections.output.chapters }}
      sections_quotes: ${{ tasks.sections.output.quotes }}
    invoke:
      tool: "nika:write"
      args:
        path: out/show-notes.md
        content: |
          # Show notes

          ${{ with.notes_summary }}

          ## Chapters

          ${{ with.sections_chapters }}

          ## Pull quotes

          ${{ with.sections_quotes }}

          *Generated by [nika](https://nika.sh) · one bounded infer, typed output · the run's trace is the receipt.*

outputs:
  notes:
    value: ${{ tasks.notes.output }}
    type: object
    description: "The typed show-notes · summary + chapters + quotes"
