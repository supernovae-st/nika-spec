# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# 05 · Fetch → bind → summarize, with graceful fallback.
#
# Demonstrates ·
#   - `invoke:` the `nika:fetch` builtin (HTTP + extraction · fetch is a TOOL, not a verb)
#   - `output:` named jq bindings → `${{ tasks.X.<name> }}`
#   - `on_error: recover:` · a LITERAL recovery value — when the fetch
#     fails, this value substitutes the raw output BEFORE extraction, so
#     it must mirror the API's shape ({ data: { title, body } }) and the
#     SAME output: bindings work on both paths (05-errors §recovery)
#   - chaining an `invoke:` result into an `infer:` prompt
#
# Run · nika run examples/05-fetch-chain.nika.yaml
# Runs green offline · the placeholder API resolves nowhere, the recover
# value takes over, the summary still lands (swap --model mock/echo in
# too and the whole file is a zero-setup rehearsal).

nika: v1
workflow: fetch-chain

model: mock/echo
vars:
  api_url: "https://api.example.com/v1/articles/latest"

tasks:
  - id: fetch_article
    invoke:
      tool: nika:fetch
      args:
        url: "${{ vars.api_url }}"
        mode: jq                    # extract structured fields, not markdown
        jq: "."
    output:                         # named bindings, extracted via jq
      title: ".data.title"
      body: ".data.body"
    on_error:
      # A LITERAL fallback · same shape as the live response, so the
      # output: bindings above extract from it identically. (A recover
      # can also reference another task — 05-errors §recovery.)
      recover:
        data:
          title: "Cached fallback article"
          body: "The archived copy — good enough for a summary when the live API is down."

  - id: summarize
    depends_on: [fetch_article]
    infer:
      prompt: |
        Summarize this article in 3 bullets.
        Title · ${{ tasks.fetch_article.title }}
        Body · ${{ tasks.fetch_article.body }}
