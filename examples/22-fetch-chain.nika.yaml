#
# 22 · Fetch → bind → summarize, with graceful fallback.
#
# Demonstrates ·
#   - `invoke:` the `nika:fetch` builtin (HTTP + extraction · fetch is a TOOL, not a verb)
#   - `output:` named JSONPath bindings (RFC 9535) → `${{ tasks.X.<name> }}`
#   - `on_error: fallback:` · use another task's output when a task fails
#   - chaining an `invoke:` result into an `infer:` prompt
nika: v1
workflow: fetch-chain

model: mock/echo
vars:
  api_url: "https://api.example.com/v1/articles/latest"

tasks:
  # A deterministic local fallback, in case the live fetch fails.
  - id: cached
    invoke:
      tool: nika:read
      args:
        path: "./fixtures/cached-article.json"

  - id: fetch_article
    invoke:
      tool: nika:fetch
      args:
        url: "${{ vars.api_url }}"
        mode: jsonpath              # extract structured fields, not markdown
        jsonpath: "$"
    output:                         # named bindings, extracted via JSONPath
      title: "$.data.title"
      body: "$.data.body"
    on_error:
      fallback: ${{ tasks.cached.output }}   # degrade gracefully to the cached copy

  - id: summarize
    depends_on: [fetch_article]
    infer:
      prompt: |
        Summarize this article in 3 bullets.
        Title · ${{ tasks.fetch_article.title }}
        Body · ${{ tasks.fetch_article.body }}
