# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# 03 · exec pipeline — shell, conditional gate, cleanup on every outcome.
#
# Demonstrates ·
#   - the `exec:` verb · shell command with `cwd`, `capture: structured`
#   - `timeout:` · Go-duration string (quoted · "5m") · hard kill incl. retries
#   - `capture: structured` · .output is { stdout, stderr, exit_code }
#   - `when:` · CEL conditional gate (only deploy if tests passed)
#   - `on_finally:` · cleanup on every outcome of a STARTED task (success /
#     fail / timeout / cancel) — never for a task that never started
#
# Runs green in ANY directory · no toolchain: `sh` captures the missing
# command as a structured non-zero exit, and the gate skips the deploy —
# the same story a red test suite tells.
#
# Run · nika run examples/03-exec-pipeline.nika.yaml

nika: v1
workflow: exec-pipeline

tasks:
  - id: test
    timeout: "5m"
    exec:
      command: "sh -lc 'cargo test --workspace --lib'"
      cwd: "."                       # your repo IS the pipeline's world
      capture: structured            # → { stdout, stderr, exit_code }
    on_finally:
      # ALWAYS runs · best-effort · cleanup errors are logged, never propagated
      - exec:
          command: "rm -rf ./target/tmp"
      - invoke:
          tool: nika:emit
          args:
            event_type: "tests.finished"
            payload:
              status: "${{ tasks.test.status }}"

  - id: deploy
    depends_on: [test]
    when: ${{ tasks.test.status == 'success' && tasks.test.output.exit_code == 0 }}
    exec:
      command: "./deploy.sh"                 # your ship step · unreached until tests are green
      cwd: "."
