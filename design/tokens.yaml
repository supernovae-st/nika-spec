# design/tokens.yaml — the nika SHARED visual vocabulary · SSOT v2
#
# THIS FILE IS THE SOURCE for every cross-repo design value: the 4 verb
# colors, the severity pair, the brand core, and each concept's per-surface
# icon binding. Every other surface is a PROJECTION:
#
#   nika.sh    src/design-tokens.generated.ts   (scripts/design-projector.py)
#   nika-vscode src/design-tokens.generated.ts  (idem · sibling checkout)
#   nika-docs  docs.json theme colors           (parity-checked, not rewritten)
#   nika-spec  showcase-projector MERMAID map   (read directly, same repo)
#   nika engine · the pack vendors this file    (sync-pack.sh · engine consts)
#
# Surfaces are heterogeneous (React SVG · vscode codicons · Mintlify
# fontawesome · terminal glyphs) — so "the same icon everywhere" is ONE
# concept row carrying its per-surface binding, all pinned here. A naive
# same-file-everywhere would be false coherence.
#
# Law: values change HERE first, then re-project (--write) and re-check
# (--check, wired in CI). Every value below is the CURRENT shipping value
# canonized 2026-07-11 — consolidation, not redesign. The terminal is
# deliberately ABSENT: engine chrome is ANSI-16 semantic by doctrine
# (nika-display theme.rs · the user's terminal theme decides those hues).

version: 1

brand:
  glyph: "🦋"
  # The served asset canon (marks · logo lockups · tiles · glyph-16 · the
  # machine-readable icon ontology icons.json/.ttl). Vendor FROM here —
  # sync contents, never rename (the vscode icons/README.md contract).
  assets: "https://nika.sh/brand/"
  color:
    bg: "#08090b"             # the dark surface (website --v4-bg == docs bg dark)
    bg_base: "#0d0d0e"        # the canvas base surface — the plane every *_text ramp is proven on
    bg_elevated: "#1c1d21"    # the elevated surface (cards · hovers) — the second proving plane
    accent: "#4f86ff"         # THE accent (blue) · website --v4-accent
    accent_strong: "#2f6bff"  # website --v4-accent-strong == docs primary/dark
    accent_bright: "#8db4ff"  # website --v4-accent-bright == docs light
    mark:
      ice: "#9fd0ff"          # nika-mark-dark.svg fill (dark surfaces)
      glow: "#cfe6ff"         # nika-mark-glow.svg (tiny sizes · WebGL)
      ink: "#04050d"          # nika-mark-light.svg fill (light surfaces)

# The 4 verbs — locked forever (spec/02-verbs.md). codicon + glyph are the
# SHIPPED vscode bindings (workflowTree ThemeIcons · the ◇▷◆✦ unicode set);
# fa is the Mintlify binding; icon is the nika.sh ontology id (icons.json).
# text is the verb hue re-anchored for BODY COPY: it clears
# rules.contrast_apca.body (APCA Lc >= 60) on brand.color.bg_base AND
# bg_elevated. invoke already clears at its base hue — its ramp is the
# identity, stored anyway (consumers read, never re-derive).
verbs:
  infer:
    color: "#5b8cff"
    text: "#90b4ff"
    codicon: "sparkle"
    fa: "sparkles"
    glyph: "◇"
    icon: "ai-magic/sparkle"
  exec:
    color: "#ff7a3c"
    text: "#ff9a6f"
    codicon: "terminal"
    fa: "terminal"
    glyph: "▷"
    icon: "console"
  invoke:
    color: "#22d3ee"
    text: "#22d3ee"
    codicon: "plug"
    fa: "plug"
    glyph: "◆"
    icon: "api-connection"
  agent:
    color: "#b07bff"
    text: "#c5a4ff"
    codicon: "robot"
    fa: "robot"
    glyph: "✦"
    icon: "agent-graph"

# The severity pair shared by run verdicts across surfaces (website run/morph
# css · vscode run-state · docs). warn stays surface-local today (no cross-
# repo consumer pins a shared warn yet — add it the day two surfaces need it).
severity:
  ok: "#34d399"
  fail: "#ff5d5d"
  fail_text: "#ff9791"      # fail re-anchored for body copy (APCA Lc >= 60 on both bg_* planes)

# The LIVE run-state palette — the register every surface that animates a
# run speaks (website run/morph/plan css · the vscode canvas NIKA skin ·
# the /brand register demos). done/failed are NOT stored here: they ARE
# severity (one storage · aliased at projection into NIKA_STATUS). running
# deliberately equals verbs.infer.color — both shipping surfaces converged
# on "work-in-flight is the thinking blue" before v2 canonized it. The
# vscode EDITOR skin stays theme-driven by design (LOCK-005: that skin
# speaks the user's theme, never the brand) — only its NIKA skin pins these.
status:
  running: "#5b8cff"
  retrying: "#e0b071"
  muted: "#5a606b"

# The per-FEATURE icon bindings — vscode codicon ids, drawn on the
# rules.icon_grid contract. Unlike the 4 verbs this set is OPEN: a feature
# lands here the day a surface pins its icon. Keys stay TS-identifier-safe
# (projected as bare object keys); values are codicon slugs (kebab). cost
# rides credit-card as the shipped interim (a bespoke 16px SVG is the
# named owed — the codicon set has no cost glyph).
icons:
  features:
    doctor: "pulse"
    wired: "plug"
    trace: "record"
    permits: "shield"
    replay: "debug-rerun"
    chain: "verified-filled"
    station: "radio-tower"
    cost: "credit-card"

# The provider PRESENTATION order (operator lock 2026-06-12): wherever a
# surface lists or exemplifies the catalog (pickers · docs · quickstarts),
# local & open-weight lead, then Mistral (EU · open-weight), then the
# rest — cloud incumbents never the first suggestion. Functional code
# (adapters · pinned e2e) is exempt: this binds the TEACHING surface.
# A provider absent from this list ranks after it, alphabetically.
presentation:
  providers_order:
    - ollama
    - lmstudio
    - llamacpp
    - localai
    - vllm
    - mistral
    - groq
    - deepseek
    - openrouter
    - huggingface
    - nvidia
    - anthropic
    - openai
    - google
    - xai

rules:
  # Mermaid classDef fill = verb color + this alpha suffix. Derived at
  # projection time, never stored as a 5th value per verb.
  mermaid_fill_alpha: "22"
  # APCA contrast floors (Lc · absolute) every *_text ramp above clears on
  # bg_base AND bg_elevated: body copy · glyphs/large text · non-text UI
  # (borders · focus rings). Floors, never targets — a surface may exceed.
  contrast_apca:
    body: 60
    glyph: 45
    nontext: 30
  # The icon raster contract every feature icon draws to: one grid size,
  # filled style, fill follows the text color — never a fixed hex.
  icon_grid:
    size: 16
    style: "filled"
    fill: "currentColor"
