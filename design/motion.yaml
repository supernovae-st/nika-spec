# design/motion.yaml вҖ” the per-verb MOTION identities В· SSOT v1
# One name per verb across every surface: the website's tiles animate
# these as CSS keyframes, the VS Code canvas replays them, the engine's
# terminal speaks them as 1-cell braille frames (nika-display theme.rs
# mirrors this table вҖ” parity-gated like the glyph column).
# Schema: DTCG-aligned (duration/cubicBezier are standard token types);
# `terminal:` is the nika extension (a first вҖ” no design system ships a
# terminal motion target today).
#
# Gates (CI В· the design-parity family В· wired with the projector wave):
#   1. every terminal frame is exactly ONE cell wide
#   2. interval_ms == duration_ms / len(frames) В· integer В· >= 80
#   3. css_keyframes exists verbatim site-side
#   4. ascii_fallback is pure 0x20-0x7E
#   5. rest/done glyphs identical across families (one vocabulary)
motion:
  version: 1
  easing:
    calm: [0.4, 0.0, 0.6, 1.0]
    steady: [0.0, 0.0, 1.0, 1.0]
    snap: [0.2, 0.0, 0.0, 1.0]
  families:
    infer:            # thinking вҶ’ SAMPLING В· scattered dots settle
      css_keyframes: nika-motion-infer
      easing: calm
      duration_ms: 800
      terminal:
        frames: ["в Ӯ","в Ҳ","в җ","в „","в  ","в Ғ","вЎҖ","в ғ","в ҳ","в Ё"]
        ascii_fallback: [".","o","O","o"]
        rest: "В·"
        done: "в—Ҹ"
    exec:             # deterministic process вҶ’ SCANLINE В· a band sweeps
      css_keyframes: nika-motion-exec
      easing: steady
      duration_ms: 800
      terminal:
        frames: ["в ү","в ’","в Ө","вЈҖ","в Ө","в ’","в ү","в ’","в Ө","вЈҖ"]
        edge_frames: ["в”Ғв•Қв”„в”Ҳ","в”Ҳв”Ғв•Қв”„","в”„в”Ҳв”Ғв•Қ","в•Қв”„в”Ҳв”Ғ"]   # the dag rail pulse window
        ascii_fallback: ["-","=","_","="]
        rest: "В·"
        done: "в—Ҹ"
    invoke:           # round-trip call вҶ’ ROUNDTRIP В· the pendulum
      css_keyframes: nika-motion-invoke
      easing: snap
      duration_ms: 800
      terminal:
        frames: ["в Ҷ","в ғ","в ү","в ҳ","в °","вў ","в °","в ҳ","в ү","в ғ"]
        ascii_fallback: ["<","^",">","v"]
        rest: "В·"
        done: "в—Ҹ"
    agent:            # autonomous loop вҶ’ ORBIT В· continuous rotation
      css_keyframes: nika-motion-agent
      easing: calm
      duration_ms: 800
      terminal:
        frames: ["в Ӣ","в ҷ","в №","в ё","в ј","в ҙ","в Ұ","в §","в Ү","в Ҹ"]
        ascii_fallback: ["|","/","-","\\"]
        rest: "В·"
        done: "в—Ҹ"
  reduced_motion:     # css prefers-reduced-motion вүЎ CLI NIKA_REDUCED_MOTION
    css: step-only
    terminal:
      collapse_to: ["В·","в—Ҹ"]
      interval_ms: 1000
