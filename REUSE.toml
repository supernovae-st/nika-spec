# REUSE 3.3 (reuse.software) · machine-readable licensing for the whole
# repository. One blanket annotation: everything in this repo is
# Apache-2.0 (the spec · examples · templates · conformance suite ·
# schemas · scripts — README §License). License text: LICENSES/Apache-2.0.txt
# (REUSE naming) — the root LICENSE file is the same text at the
# GitHub-conventional path.

version = 1

[[annotations]]
path = "**"
precedence = "closest"
SPDX-FileCopyrightText = "2026 SuperNovae Studio <nika@supernovae.studio>"
SPDX-License-Identifier = "Apache-2.0"

# DATA and prose whose CONTENT embeds SPDX-shaped text the extractor
# would misread (benchmark JSONs record whole template files · the
# example READMEs describe the fixture header in prose). `override`
# makes this file's annotation the truth regardless of in-content text.
[[annotations]]
path = "eval/results/**"
precedence = "override"
SPDX-FileCopyrightText = "2026 SuperNovae Studio <nika@supernovae.studio>"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["examples/README.md", "examples/showcase/README.md"]
precedence = "override"
SPDX-FileCopyrightText = "2026 SuperNovae Studio <nika@supernovae.studio>"
SPDX-License-Identifier = "Apache-2.0"
