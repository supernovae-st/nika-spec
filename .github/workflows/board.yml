# Nika Project OS · prove locally, then reconcile the public Project.
#
# timeline/timeline.yaml owns the record and gates. GitHub Issues, pull
# requests and releases own live work. project/project-os.yaml owns only the
# projection contract. The reconciler is incremental and never deletes a
# Project item.
#
# SECURITY: zero interpolation of event data in run steps. Every third-party
# action is SHA-pinned. BOARD_PROJECT_TOKEN reaches Python through env only.
# GITHUB_TOKEN cannot write an organization Project, so a missing fine-grained
# token renders a notice and skips the live leg without weakening the audit.

name: project-os

on:
  push:
    branches: [main]
    paths:
      - "timeline/**"
      - "project/**"
      - "project_os/**"
      - ".github/workflows/board.yml"
  pull_request:
    paths:
      - "timeline/**"
      - "project/**"
      - "project_os/**"
      - ".github/workflows/board.yml"
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - assigned
      - unassigned
      - labeled
      - unlabeled
      - milestoned
      - demilestoned
  release:
    types: [published, edited, deleted]
  repository_dispatch:
    types: [nika-project-os-sync]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-os
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install the pinned audit environment
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --require-hashes -r .github/requirements.txt
      - name: Prove Project OS offline
        run: |
          set -euo pipefail
          python3 project/verify.py --offline
          python3 timeline/verify.py --offline
          python3 -m unittest discover -s project_os -p "test_*.py"
          ruff check project_os project/verify.py timeline/project-board.py timeline/verify.py

  reconcile:
    if: github.event_name != 'pull_request'
    needs: audit
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Guard on the Project token
        id: guard
        env:
          BOARD_KEY: ${{ secrets.BOARD_PROJECT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${BOARD_KEY:-}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::BOARD_PROJECT_TOKEN unset · Project OS reconciliation skipped"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.guard.outputs.ok == 'true'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        if: steps.guard.outputs.ok == 'true'
        with:
          python-version: "3.12"
      - name: Install the pinned projector environment
        if: steps.guard.outputs.ok == 'true'
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --require-hashes -r .github/requirements.txt
      - name: Reconcile Project OS
        if: steps.guard.outputs.ok == 'true'
        env:
          BOARD_PROJECT_TOKEN: ${{ secrets.BOARD_PROJECT_TOKEN }}
        run: |
          set -euo pipefail
          python3 timeline/project-board.py --apply
