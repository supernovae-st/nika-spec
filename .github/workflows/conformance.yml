name: Conformance

# The static conformance gate · every push/PR runs
#   · tests/core      — Level-1 Core fixtures (parse + validate + DAG + variables + errors)
#   · tests/stdlib    — Stdlib v0.1 static-surface fixtures (canon.yaml-driven names + shapes)
#   · examples/       — every shipped example executed as a conformance input (must be valid)
# via the reference oracle `conformance/runner.py all` (exit non-zero on any failure).
#
# Security note: push/PR/dispatch triggers only · no user-controlled strings
# reach the shell · the runner reads repo files exclusively.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-gate:
    name: static gate · core + stdlib surface + examples
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runner deps
        run: pip install pyyaml jsonschema

      # jq is the oracle's compile check for workflow-supplied jq expressions
      # (nika:jq · fetch.jq · output bindings). Absent, those go UNVERIFIED and
      # the runner warns — so the gate installs it explicitly rather than lean
      # on the runner image shipping it.
      - name: Ensure jq (workflow jq-expression compile check)
        run: jq --version || sudo apt-get update && sudo apt-get install -y jq

      - name: Run the static conformance gate
        run: |
          python conformance/runner.py all
          python conformance/type_core_selftest.py

      # The committed corpus must be BYTE-exact against type_core.py (a
      # drifted corpus makes the Rust differential judge stale verdicts)
      # and every broken-judge mutation must be killed by it.
      - name: Type corpus · drift + mutation adequacy
        run: |
          python scripts/gen-type-corpus.py --check
          python scripts/gen-type-corpus.py --mutate

      - name: Projection gates · in-repo canon markers + pack manifest + llms files
        run: |
          python scripts/canon-projectors.py --check
          python scripts/showcase-projector.py --check
          python scripts/llms-projector.py --check
          python scripts/starters-projector.py --check
          python scripts/authoring-projector.py --check
          python scripts/design-projector.py --check
