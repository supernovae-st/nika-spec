# canon/projections.yaml · C0 SANDBOX SKELETON · Projection Registry
# Schema: schemas/registries.schema.json#/$defs/projectionRow (SCELLÉ · consommé as-is).
# Ce que C0 importe ici : chaque projection générée (prose blocks · schema · canon.yaml
# compat · CLI tables · etc.) avec generator + check_command + digest_home (SSOT-1
# §21-23 : générateur identifié · --check · édition manuelle = CI rouge).
# Row seed RÉELLE : la projection laws-index émise par le ssot-compiler v0 de CE
# sandbox (auto-descriptive · le --check ci-dessous est exactement la commande de
# preuve jouée dans PROOFS.md).
registry_document_format: 1
"$comment": "C0 sandbox skeleton · seed row = the laws-index projection THIS sandbox compiler emits (self-describing · the check_command is the proof command) · full projector inventory import owed at C0"
projections:
  - id: laws-index
    status: reserved
    owner: tooling
    law_ids: []
    introduced_in: C0
    sources: ["laws"]
    generator:
      identity: ssot-compiler
      version: 0.1.0-sandbox
    outputs:
      - projections/laws-index.json
    check_command: "python3 scripts/ssot-compiler.py --check"
    digest_home: canon/ssot.lock
    channel_sensitivity: stable-only
    notes: "SSOT-1 §21 verbatim : « Le générateur possède : une identité/version ; une commande unique ; un mode write ; un mode --check ; une sortie déterministe ; un digest ; aucune dépendance réseau. » La row décrit le compiler v0 du sandbox ; l'inventaire complet des projectors (machine/projector-inventory.json) s'importe à C0."
