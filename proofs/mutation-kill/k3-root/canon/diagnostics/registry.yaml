# canon/diagnostics/registry.yaml · C0 SANDBOX SEED · Diagnostic Registry (SSOT-2 §B)
# Schema: schemas/registries.schema.json#/$defs/diagnosticRow (SCELLÉ · consommé as-is).
# R11 point 5 verbatim : « Ajouter des codes machine namespacés et stables pour :
# anchor interdit ; alias interdit ; merge key interdite ; duplicate key. »
# Les 4 codes MANDATÉS = NIKA-YAML-001..004. NIKA-YAML-005 (scalar cap · gap P5) est
# hérité du draft. FINDING-05 : NIKA-YAML-006..011 sont C0-PROPOSED (branches R11
# point 13 · SSOT-2 B.21 : « Aucun rejet normatif sans diagnostic canonique lorsqu'il
# est exposé à l'utilisateur ») · renumérotables avant C1, jamais après mint.
# Choix de champs (documenté · pas silencieux) : plane=check (ces codes vivent au
# check du profil) · outcome_class=failure + cause=profile_violation (le schema exige
# les 2 champs SSOT-2 B.16 même pour la plane check ; la cause n'est PAS une row de
# la table 13 runtime, voir $comment) · retryable=false · terminal=true ·
# span_required=true (R11 point 4 : diagnostic pédagogique pointé source).
# Teachings 001..005 : repris du draft consommé (contenu préservé · séparateur
# normalisé au style maison « · » · le draft est une proposition, pas un ruling).
registry_document_format: 1
"$comment": "C0 sandbox seed · 4 mandated codes (R11 point 5) + scalar-cap code (P5 gap) + 6 c0-proposed codes (R11 point 13 branches · FINDING-05) · cause=profile_violation is a check-plane cause, never a table-13 runtime row"
diagnostics:
  - id: NIKA-YAML-001
    status: reserved
    owner: spec
    law_ids: ["LAW-GRAMMAR-0101"]
    introduced_in: C0
    namespace: YAML
    plane: check
    condition: "anchor node present"
    outcome_class: failure
    cause: profile_violation
    retryable: false
    terminal: true
    payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
    span_required: true
    teaching: "YAML valide mais le profil Nika interdit les anchors · inline la valeur."
