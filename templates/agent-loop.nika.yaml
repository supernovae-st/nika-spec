# SPDX-License-Identifier: Apache-2.0
# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# TEMPLATE · agent-loop · plan fast → execute with a leashed agent → validate the typed result.
#
#   [plan]────▶[execute]─────▶[confirm]
#   infer       agent·leashed  nika:assert
# Green as-is · `nika check <file>` · fill the `# SLOT:` lines · repair from the fix lines · re-check.
nika: v1
workflow:
  id: agent-loop-template       # SLOT: kebab-case workflow id
  description: "plan → budgeted agent → typed result"   # SLOT

model: ollama/qwen3.5:4b           # SLOT: a tool-calling model · local by default

vars:
  goal:
    type: string
    required: true
    description: "What the agent must accomplish"   # SLOT

tasks:
  plan:
    infer:
      prompt: "Break '${{ vars.goal }}' into at most 4 concrete steps."   # SLOT
      schema:
        type: object
        required: [steps]
        properties:
          steps: { type: array, items: { type: string } }

  execute:
    with:
      steps: ${{ tasks.plan.output.steps }}
    agent:
      # The done-contract belongs IN the prompt: the final message must
      # carry the schema'd shape, so SAY so — a live model that is not
      # told finishes in prose and fails NIKA-INFER-002 (proven on GPT).
      system: "Work the plan step by step. When finished, reply with ONLY your final result as an object carrying a `findings` array (one short string each), then call nika:done."   # SLOT
      prompt: "Plan · ${{ with.steps }}"
      tools:                        # SLOT: the MINIMUM grant for the job
        - "nika:read"
        - "nika:done"
      max_turns: 15                 # SLOT: the loop bound
      max_tokens_total: 80000       # SLOT: the spend bound
      schema:                       # SLOT: the typed final-message contract
        type: object
        required: [findings]
        properties:
          findings: { type: array, items: { type: string } }

  confirm:
    with:
      has_findings: ${{ size(tasks.execute.output.findings) > 0 }}   # the check crosses as ONE boundary expression
    invoke:
      tool: "nika:assert"
      args:
        condition: "${{ with.has_findings }}"
        message: "Agent returned no findings, do not trust an empty run"   # SLOT

outputs:
  findings:
    value: ${{ tasks.execute.output.findings }}
    type: array
    description: "The agent's typed findings"   # SLOT
