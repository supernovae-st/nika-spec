# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# TEMPLATE · gate-and-act · check a condition, act only when it holds.
#
#   [check]────when(cond)────▶[act]
#   nika:fetch                 nika:notify
# Green as-is · `nika check <file>` · fill the `# SLOT:` lines · repair from the fix lines · re-check.
nika: v1
workflow:
  id: gate-and-act-template     # SLOT: kebab-case workflow id
  description: "watch a value · act only when the condition holds"   # SLOT

vars:
  source_url: "https://api.example.com/v1/value"   # SLOT: what to watch
  threshold: 100                    # SLOT: the trigger condition value

secrets:
  webhook:
    source: env
    key: ALERTS_WEBHOOK_URL         # SLOT: where the act lands
    egress:
      - to: "nika:notify"
        host_from_self: true        # the secret value IS the destination URL

tasks:
  check:
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ vars.source_url }}"
        mode: jq
        jq: "."
    output:
      value: ".value"               # SLOT: the jq path to the watched field
    on_error:
      # Offline rehearsal · a sample UNDER the threshold — the gate stays
      # closed, the skeleton runs green before you wire the real source.
      recover: { value: 42 }

  act:
    depends_on: [check]
    # when: is a SKIP gate — routing, not failure (a skipped task is not an error)
    when: ${{ tasks.check.value > vars.threshold }}   # SLOT: the CEL condition
    invoke:
      tool: "nika:notify"           # SLOT: the action · notify / write / exec
      args:
        channel: webhook
        target: "${{ secrets.webhook }}"
        message: "Threshold crossed · ${{ tasks.check.value }}"   # SLOT
        severity: warning

outputs:
  value: ${{ tasks.check.value }}
