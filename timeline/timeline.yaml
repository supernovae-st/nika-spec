# The Nika timeline · the one verifiable record
# SPDX-License-Identifier: Apache-2.0
#
# SSOT for the project's history, releases, and forward gates. Every
# surface that tells the story (site /timeline · READMEs · changelog
# era notes) derives from THIS file — never the reverse.
#
# The honesty contract: every entry carries an `evidence` block with a
# `class`. Provable classes (git-tag · github-release · github-commit ·
# github-pr · crates-io) are RE-PROVEN by timeline/verify.py in CI —
# a claim whose proof stops resolving turns the gate red. Unprovable
# classes (testimony · private-archive) are permitted, labeled, and
# never counted as proof: a reader always sees which kind of truth
# they are holding.
#
# The three eras (operator-locked 2026-07-20):
#   exploration · summer 2025 → end 2025 · private prototypes, before git
#   brouillon   · 2026-01-01 → 2026-04-13 · the git draft era (the branch
#                 is literally named `brouillon`) · 0.1 → 0.79 · public
#                 crates.io spine in March · a 138K-line monolith
#   diamond     · 2026-04-13 → today · rewrite from scratch · the clean
#                 language · orphan branch · the version line continues
#
# The future carries NO dates. Forward motion is expressed as GATES —
# conditions that must hold (a launch ships when ready, never on a
# date). Entries are append-only; a correction adds a note, it never
# silently rewrites.

schema_version: 1
last_updated: "2026-07-22"
verifier: timeline/verify.py

evidence_classes:
  git-tag: "a tag in THIS repo (nika-spec) · verified locally"
  github-release: "a release tag on a public supernovae-st repo · verified via the GitHub API"
  github-commit: "a commit on a public supernovae-st repo · verified via the GitHub API"
  github-pr: "a merged PR on a public supernovae-st repo · verified via the GitHub API"
  crates-io: "a published version on crates.io (yanked versions remain listed forever) · verified via the crates.io API"
  scorecard: "an OpenSSF Scorecard result · verified via the scorecard API (score moves weekly · the entry records a dated reading)"
  private-archive: "a commit/tag in the private legacy archive (the brouillon branch) · SHA recorded · auditable under access, not publicly resolvable"
  testimony: "the maintainer's dated account · no mechanical proof exists or is claimed"

eras:
  - id: exploration
    span: "summer 2025 → end 2025"
    title: "Exploration"
    story: >-
      The idea takes shape through private prototypes and throwaway
      vibe-code experiments — on the maintainer's machine and private
      repos, before the language has a public repo, a name in git, or
      a single committed line. The question being circled: repeatable
      AI work should live in files, reviewed and re-run, not evaporate
      into chats.
    evidence: { class: testimony }

  - id: brouillon
    span: "2026-01-01 → 2026-04-13"
    title: "The brouillon era (0.1 → 0.79)"
    story: >-
      The language goes to git — on a branch literally named
      `brouillon` (draft). 79 minor versions in 103 days: templating,
      DAG validation, providers, tools, check-before-run. A 138K-line
      monolith and 192 tags. Seven of those versions ship publicly to
      crates.io through March. By the end the team knows exactly what
      the language wants to be — and exactly why the engine must be
      rebuilt to carry it.
    evidence: { class: private-archive, note: "the full branch + 192 tags live in the private archive · the crates.io trail below is this era's public spine" }

  - id: diamond
    span: "2026-04-13 → today"
    title: "The Diamond era (the clean language)"
    story: >-
      A rewrite from scratch on an orphan branch — zero shared history
      with the brouillon code. Craft, not extraction: every crate
      re-enters through a 12-gate admission. The version line continues
      (0.80 picks up where 0.79 stopped) because the LANGUAGE is the
      continuity; the engine is the rewrite. This is where the
      specification, the conformance suite, and the standard surfaces
      are built.
    evidence: { class: github-commit, repo: supernovae-st/nika, sha: 0cc7b74235c896f16d326795786a7f7b40241c43 }

entries:
