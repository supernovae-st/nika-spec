  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0104
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: duplicate mapping key
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: Clé dupliquée · chaque clé de mapping est unique.
- id: NIKA-YAML-005
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0110
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: scalar length > cap
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: Scalar trop long · le profil borne la taille (voir le cap déclaré).
- id: NIKA-YAML-006
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0105
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: custom tag present (outside YAML core schema)
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: Tag custom interdit · le profil Nika n'admet que le schema core YAML (str, int, float, bool,
    null, map, seq).
  notes: c0-proposed (FINDING-05) · renumérotable avant C1.
- id: NIKA-YAML-007
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0106
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: non-string mapping key
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: Clé non-string interdite · chaque clé de mapping du profil Nika est une string.
  notes: c0-proposed (FINDING-05) · renumérotable avant C1.
- id: NIKA-YAML-008
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0107
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: non-finite float scalar (.nan/.inf)
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: NaN et Infinity sont interdits · le JSON canonique du Semantic IR n'admet que des nombres
    finis.
  notes: c0-proposed (FINDING-05) · renumérotable avant C1.
- id: NIKA-YAML-009
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0108
