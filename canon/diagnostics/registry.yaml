  span_required: true
  teaching: Document trop profond · le profil borne la profondeur d'imbrication (voir le cap déclaré).
  notes: c0-proposed (FINDING-05) · cap TO-RULE (FINDING-04).
- id: NIKA-YAML-010
  status: reserved
