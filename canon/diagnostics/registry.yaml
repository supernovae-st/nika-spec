  notes: c0-proposed (FINDING-05) · cap TO-RULE (FINDING-04).
- id: NIKA-YAML-011
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0111
  introduced_in: C0
  namespace: YAML
  plane: check
