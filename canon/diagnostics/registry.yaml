  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: La source viole le contrat Unicode du profil (NFC/BOM) · voir la disposition déclarée au registre
    grammar.
  notes: c0-proposed (FINDING-05) · disposition TO-RULE (FINDING-04).
- id: NIKA-AGENT-001
  status: reserved
  owner: spec
  law_ids:
  - LAW-OUTCOME-0403
  introduced_in: C0
  notes: Seeded at the SSOT-1 §27 import wave (2026-07-17) · minted by its citing laws (§12 no-orphan)
    · shape fills at C1.
  plane: check
  namespace: AGENT
  condition: reserved-at-seed · agent bound reached (max_turns / max_tokens_total) without done · the
    exact condition mints at C1 with the budget_exhausted row (N2-b)
  outcome_class: failure
  cause: budget_exhausted
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/nika-agent-payload
  span_required: true
  teaching: 'The agent hit its declared bound (max_turns or max_tokens_total) before done: raise the bound,
    tighten the task, or split the loop · the run fails with cause budget_exhausted (never a silent stop)
    · N2-b.'
