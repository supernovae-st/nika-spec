registry_document_format: 1
$comment: C0 sandbox seed · 4 mandated codes (R11 point 5) + scalar-cap code (P5 gap) + 6 c0-proposed
  codes (R11 point 13 branches · FINDING-05) · cause=profile_violation is a check-plane cause, never a
  table-13 runtime row
diagnostics:
- id: NIKA-YAML-001
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0101
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: anchor node present
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: YAML valide mais le profil Nika interdit les anchors · inline la valeur.
- id: NIKA-YAML-002
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0102
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: alias node present
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
  span_required: true
  teaching: Les aliases (*ref) sont interdits · répète la valeur explicitement.
- id: NIKA-YAML-003
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0103
  introduced_in: C0
  namespace: YAML
  plane: check
  condition: merge key << present
  outcome_class: failure
  cause: profile_violation
  retryable: false
  terminal: true
  payload_schema: to-mint-c1/diagnostics/payloads/yaml-profile.schema.json
