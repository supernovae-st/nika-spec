registry_document_format: 1
$comment: C0 sandbox skeleton · seed rows = the R11 pilot generated_facts tables · cap VALUES and unicode
  disposition RULED at C1 (D-2026-07-17-N5 · value_shape ids encode the numbers · the reference evaluator
  conformance/yaml_profile_core_selftest.py cross-checks them) · full grammar import owed at C0
grammar:
- id: yaml_forbidden_event_classes
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0101
  - LAW-GRAMMAR-0102
  - LAW-GRAMMAR-0103
  - LAW-GRAMMAR-0104
  - LAW-GRAMMAR-0105
  - LAW-GRAMMAR-0106
  - LAW-GRAMMAR-0107
  introduced_in: C0
  position: yaml_source_document
  fields:
  - name: anchor
    cardinality: forbidden
  - name: alias
    cardinality: forbidden
  - name: merge_key
    cardinality: forbidden
  - name: duplicate_key
    cardinality: forbidden
  - name: custom_tag
    cardinality: forbidden
  - name: non_string_key
    cardinality: forbidden
  - name: non_finite_float
    cardinality: forbidden
  notes: La table des classes d'events interdites par le profil YAML Nika (R11 points 1 + 13). C'est la
    table que les évaluateurs CONSOMMENT (judgment.generated_facts) ; chaque évaluateur implémente le
    jugement lui-même (independent_judgment).
- id: yaml_scalar_cap
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0110
  introduced_in: C0
  position: yaml_scalar
  fields:
  - name: size_over_cap
    cardinality: forbidden
    value_shape: cap_65536_bytes
  notes: 'Cap RULÉ D-2026-07-17-N5 : 65536 bytes UTF-8 par scalar (64 KiB) · refus NET jamais troncature
    (NIKA-YAML-005). Note de clôture R11 verbatim : « (Ferme le gap P5 : le cap de taille scalaire — 200k
    chars passait — entre au profil normatif.) » L''empirie third-pass (200k passait) bornait le débat ;
    le ruling grave 64 KiB (tout prompt inline honnête tient · au-delà = fichier référencé). Frontière
    exacte : conformance/yaml-profile/valid/scalar-at-cap admet · invalid/scalar-over-cap refuse.'
- id: yaml_document_caps
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0108
  - LAW-GRAMMAR-0109
  introduced_in: C0
  position: yaml_document
  fields:
  - name: depth_over_cap
    cardinality: forbidden
    value_shape: cap_64_levels
  - name: size_over_cap
    cardinality: forbidden
    value_shape: cap_1048576_bytes
  notes: 'Caps RULÉS D-2026-07-17-N5 : profondeur 64 niveaux (la collection racine = niveau 1 · NIKA-YAML-009)
    · document 1048576 bytes (1 MiB · NIKA-YAML-010) · refus NET jamais troncature. Frontières exactes :
    conformance/yaml-profile/valid/depth-at-cap (64 pile) admet · invalid/depth-over-cap (65) refuse ·
    invalid/document-over-cap (cap+1 bytes) refuse.'
- id: yaml_unicode_contract
  status: reserved
  owner: spec
  law_ids:
  - LAW-GRAMMAR-0111
  introduced_in: C0
  position: yaml_source_bytes
  fields:
  - name: non_nfc_or_bom_disposition
    cardinality: required
    value_shape: refuse_bom_require_nfc
  notes: 'Disposition RULÉE D-2026-07-17-N5 : BOM REFUS (jamais un strip silencieux) · NFC obligatoire
    (jamais une normalisation silencieuse) · refus NET (NIKA-YAML-011 · une seule row, deux branches).
    Déterminisme du hash sémantique : deux encodages du même texte ne hashent jamais différemment. Fixtures
    : conformance/yaml-profile/invalid/bom + invalid/non-nfc refusent · valid/unicode-nfc admet.'
- id: envelope_nika_field
  status: reserved
  owner: spec
  law_ids:
  - LAW-SURFACE-0101
  introduced_in: C0
  position: envelope
  fields:
  - name: nika
    cardinality: required
    value_shape: nika_v1_literal
  notes: 'R11 point 16 verbatim : « Le langage reste nika: v1. » Le champ d''enveloppe nika est requis
    et sa valeur est le littéral v1.'
