  # ─────────────────── B-17 point 7 · EffectiveAttemptTimeout = min(...) ───────

  - id: LAW-TEMPORAL-0405
    slug: b17/effective-attempt-timeout-min
    status: reserved
    owner: spec
    domain: TEMPORAL
    title: "Avant chaque tentative le timeout effectif est le min des trois bornes restantes"
    prose_projection:
      chapters: ["03-dag"]
      text: "B-17 point 7 verbatim : « Avant chaque tentative : EffectiveAttemptTimeout = min(LocalAttemptTimeout, RemainingWorkflowDeadline, RemainingDeploymentDeadline) » La derivation est deterministe et re-derivable a chaque tentative."
    inputs:
      - registry: ir
        id: local_attempt_timeout
        role: required
      - registry: ir
        id: remaining_workflow_deadline
        role: required
      - registry: ir
        id: remaining_deployment_deadline
        role: required
    premises:
      - operator: min_of
        operands:
          - registry: ir
            id: effective_attempt_timeout
          - registry: ir
            id: local_attempt_timeout
          - registry: ir
            id: remaining_workflow_deadline
          - registry: ir
            id: remaining_deployment_deadline
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: effective_attempt_timeout
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: effective_attempt_timeout
      independent_judgment: true
    domain_payload:
      kind: temporal
      measure: attempt_timeout
      composition: min
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/temporal/attempt-timeout-clamped-by-deadline
    projections: ["prose:03-dag", "cli:check", "receipt"]
    implementation_surfaces:
      - engine:nika
      - reference:temporal_core.py
      - conformance:temporal-suite
    introduced_in: C0
    proof_obligations:
      - "L'operande cible du min_of est effective_attempt_timeout (forme target-first du schema scelle) ; les trois sources sont exactement celles du point 7, dans l'ordre du ruling."
    closure_gates:
      - fixture-parity
      - receipt-parity

