# canon/laws/temporal.yaml · C0 import · B-17 modele temporel + F4 + N2-b + F5
# SSOT: RULINGS_2026-07-15.md §Annexe B-17 (39 points · verbatim · JAMAIS paraphrase,
# les citations reproduisent les bytes du ruling, ancres "B-17 point N") + l'annexe datee
# mini-gates ANNEX_2026-07-17_minigates-winners.md (D-2026-07-17-N2 · F4 remodel-per-B17 ·
# N2-b nouvelle row table 13 · F5 keep-hardened) + les receipts
# mini-gates/f4-limits-temporal-receipt.md et mini-gates/f5-stop-completion-receipt.md +
# le census mini-gates/F4_TIMEOUT_RETRY_CENSUS.md (les 2 proses a tuer).
# Schema: schemas/law.schema.json (SCELLE · consomme as-is). Blocs d'ids de ce groupe:
# TEMPORAL 04xx + OUTCOME 04xx (les lois outcome de B-17/N2-b vivent ICI, le fichier
# suit le GROUPE de rulings, le domaine suit le schema).
#
# FINDING-T1 (SSOT-1 §29 · divergence live-spec vs loi rulee · kill PLANIFIE, jamais
# silencieux) : spec/03-dag.md §timeout enseigne AUJOURD'HUI « Hard timeout for the
# entire task (including any retries and their backoff sleeps · wall-clock) » (:601-602)
# et « Maximum · 24h » (:625), en contradiction avec B-17 points 5 + 2/37 et le re-loi F4.
# Le census F4 nomme les 2 proses a tuer (spec/spec/03-dag.md:592-606 +
# docs/reference/yaml-syntax.mdx:72), reecrites dans le MEME commit cascade P-C.
# Ce fichier importe la loi rulee + les closure gates, il ne reecrit RIEN du spec.
#
# FINDING-T2 (vocabulaire fixture pre-cascade) : la fixture REELLE
# conformance/tests/runtime/agent/001-budget-exhaustion-fails prouve le cote "epuise"
# de N2-b mais sa note expected-run epelle "budget_error" (la CATEGORY des codes
# NIKA-AGENT-001/002 dans canon.yaml + spec/05-errors.md), tandis que N2-b mint la row
# Outcome cause `budget_exhausted`. La fixture se re-keye a la cascade P-C, referencee
# telle quelle ici, jamais editee en silence.
#
# FINDING-T3 (grammaire diagCode scellee vs code live) : la row cancelled/budget de la
# table 13 cite NIKA-RUN-1704 (spec/13-outcomes.md · serial 4 chiffres) ; le pattern
# diagCode du schema scelle admet exactement 3 chiffres. Toute loi future citant
# NIKA-RUN-1704 dans diagnostics[] echouerait la validation : ruling C1 requis
# (renumerotation ou amendement de grammaire). Aucune loi de ce fichier ne le cite.
#
# FINDING-T4 (mapping de domaine per grant · precedent FINDING-01 du pilote) :
# B-17 point 39 (« Le langage reste nika: v1. » · classe SURFACE), points 33-34
# (placement classe HASH), point 36 (suite classe CONF) et la mecanique codemod F4
# (classe MIGR · equivalence-or-stop) s'ancrent DANS les lois TEMPORAL/OUTCOME de ce
# groupe : les blocs accordes sont TEMPORAL/OUTCOME/GUAR 04xx uniquement. Couverture
# preservee par citation verbatim ; re-domiciliation cross-domain = geste C1 opere.
#
# FINDING-T5 (codes c0-proposed · precedent FINDING-05 du pilote) : NIKA-TEMPORAL-001
# (incompatibilite de capacites temporelles refusee avant run · B-17 points 16-17) et
# NIKA-TEMPORAL-002 (duree non entiere-exacte / overflow refuse · point 31) sont mintes
# c0-proposed (SSOT-2 B.21 : un diagnostic canonique par rejet normatif expose),
# renumerotables avant C1. B-17 lui-meme ne mandate aucun code.
#
# Fixtures : les REELLES du repo spec sont referencees quand elles existent
# (conformance/verbs/* · conformance/errors/* · conformance/tests/core/errors/* ·
# conformance/tests/runtime/agent/*) ; le reste = to-mint-c1/<slug> (convention pilote),
# noms des classes de test tires de B-17 point 36 et de la paire du census F4.

laws_document_format: 1

pilot: b17-f4-n2b-f5-temporal

laws:

  # ─────────────────── B-17 points 1 + 2 + 3 · aucun cap universel ─────────────

  - id: LAW-TEMPORAL-0401
    slug: b17/no-universal-cap
    status: reserved
    owner: spec
    domain: TEMPORAL
    title: "Aucune duree maximale universelle codee dans le langage, le cap 24 h est supprime"
    prose_projection:
      chapters: ["03-dag"]
      text: "B-17 point 1 verbatim : « Nika ne possède aucune durée maximale universelle codée dans le langage. » · B-17 point 2 verbatim : « Supprimer toute mention normative d'un cap fixe de 24 h. » · B-17 point 3 verbatim : « L'exemple de 48 h devient légal si les capacités du deployment permettent son exécution. » La borne vient du programme ou du deployment (points 15-16, loi LAW-TEMPORAL-0413), jamais d'un cap du langage."
    inputs:
      - registry: grammar
        id: temporal_duration_grammar
        role: required
      - registry: ir
        id: deployment_capabilities
        role: ceiling
    premises:
      - operator: absent
        operands:
          - registry: grammar
            id: universal_duration_cap
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: temporal_duration_grammar
      independent_judgment: true
    domain_payload:
      kind: temporal
      measure: attempt_timeout
      composition: independent
    diagnostics: []
    fixtures:
      - conformance/tests/core/errors/006-valid-timeout-compound
      - to-mint-c1/conformance/temporal/timeout-48h-legal
      - to-mint-c1/conformance/temporal/multi-day-duration-legal
    projections: ["prose:03-dag", "schema", "cli:check", "docs"]
    implementation_surfaces:
      - engine:nika
      - reference:temporal_core.py
      - cli:nika-check
      - conformance:temporal-suite
    introduced_in: C0
    proof_obligations:
      - "B-17 point 37 verbatim : « Aucun cap 24 h résiduel dans : spec ; canon ; schema ; engine ; Oracle ; docs ; fixtures ; diagnostics ; SDK ; LSP/MCP. » Le census de LAW-TEMPORAL-0424 rend le compte exact."
      - "FINDING-T1 : la prose actuelle spec/03-dag.md porte le cap (:625, verbatim spec : « Maximum · `24h`. »), kill-target du census F4, reecrite dans le meme commit cascade que le re-loi (jamais de fenetre ou la doc enseigne l'ancien cap)."
      - "B-17 point 3 verbatim : « L'exemple de 48 h devient légal si les capacités du deployment permettent son exécution. » La fixture timeout-48h-legal admet des que le deployment le supporte."
    closure_gates:
      - cap-24h-census-zero
      - fixture-parity

