# canon/laws/constructors.yaml · C0 IMPORT · R6 constructeurs réservés
# SSOT: RULINGS_2026-07-15.md §R6 (10 points + la note de cascade · verbatim · JAMAIS
# paraphrasé, les citations reproduisent les bytes du ruling, ancres "R6 point N").
# Schema: schemas/law.schema.json (SCELLÉ · consommé as-is). Bloc d'ids du groupe :
# SURFACE 05xx · GRAMMAR 05xx · CONF 05xx · MIGR 05xx (0520-0529 réservés à constructors).
# Couverture : p1 → SURFACE-0520 · p2 → SURFACE-0521 · p3 → SURFACE-0523 + GRAMMAR-0520
# + GRAMMAR-0521 · p4 → SURFACE-0522 · p5 + note cascade → MIGR-0520 · p6+p7+p8+p10 →
# SURFACE-0524 · p9 → CONF-0520.
#
# FINDING-A (part constructors · SSOT-1 §29) : R6 point 5 est une migration doc-kill
# (mentions "lands with" + strings de diagnostic ENGINE) SANS row dans canon/migrations.yaml
# (rows existantes : mig-f1..f5 + mig-n2a + mig-n2b) · et canon/types.yaml notes cite un
# "migration-plan MIG-constructors" qui n'a pas non plus de row. Row à minter par
# l'orchestrateur, jamais ici (mission : jamais l'ajouter).
#
# FINDING-E (SSOT-1 §29) : la row normative NIKA-TYPE-005 (09-types.md:380 + 05-errors.md:116)
# dit "a secret-carrying type in a lowered position (reserved with secret<T> · W4)" : elle
# porte À LA FOIS une réservation secret<T> que R6 point 2 retire ET une attribution de
# vague (W4) que R6 point 5 tue. Le sort de NIKA-TYPE-005 (réécrit sur la représentation
# IR interne de la sensibilité, ou retiré) n'est PAS tranché par R6 : arbitrage owed à la
# cascade, enregistré ici, jamais décidé silencieusement.
#
# Refs : les symboles constructeurs vivent en registry ir (convention sandbox), SAUF la
# row seedée types/artifact_constructor_reserved (le sujet réel de SURFACE-0523).

laws_document_format: 1

group: r6-reserved-constructors

laws:

  # ─────────────────── R6 point 1 · result<T> retiré ────────────────────────────

  - id: LAW-SURFACE-0520
    slug: constructors/result-withdrawn
    status: reserved
    owner: spec
    domain: SURFACE
    title: "result<T> est retiré de la grammaire publique et de la liste des constructeurs réservés"
    prose_projection:
      chapters: ["09-types"]
      text: "R6 point 1 verbatim : « **result<T>** → retirer de la grammaire publique et de la liste des constructeurs réservés. Motivation : risque de duplication avec Outcome.class/cause/payload ; sémantique succès/erreur non définie ; aucun consommateur démontré ; le nom pourra être réévalué uniquement avec un besoin distinct d'Outcome. » Post-retrait, result<...> en position de type n'est ni réservé ni connu : il refuse comme nom de type inconnu."
    inputs:
      - registry: ir
        id: result_constructor_type_position_event
        role: required
    premises:
      - operator: present
        operands:
          - registry: ir
            id: result_constructor_type_position_event
        quantifier: exists
    conclusion:
      verdict: refuse
      diagnostics_on_refuse: ["NIKA-TYPE-001"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: public_reserved_constructors
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: reservation
      subject:
        registry: ir
        id: result_constructor_spelling
    diagnostics: ["NIKA-TYPE-001"]
    fixtures:
      - to-mint-c1/conformance/constructors/valid/no-result-type
    negative_fixtures:
      - conformance/tests/core/types/009-reserved-constructor
    projections: ["prose:09-types", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:type_core.py
      - cli:nika-check
      - conformance:constructors-suite
    introduced_in: C0
    proof_obligations:
      - "La fixture réelle 009-reserved-constructor (returns: result → valid:false · NIKA-TYPE-001) garde sa polarité négative post-retrait ; son expected note « result/artifact/secret are named but land with their waves » meurt avec le census R6 point 5 (LAW-MIGR-0520)."
      - "R6 point 1 verbatim : « le nom pourra être réévalué uniquement avec un besoin distinct d'Outcome. » Aucune réintroduction sans ce besoin démontré."
    closure_gates:
      - fixture-parity
      - reserved-list-excludes-result

