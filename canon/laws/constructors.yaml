          cardinality: required
        - field: media_type
          cardinality: required
        - field: size
          cardinality: required
        - field: provenance
          cardinality: required
        - field: storage_reference
          cardinality: required
        - field: integrity
          cardinality: required
        - field: lifecycle
          cardinality: required
        - field: composition
          cardinality: required
        - field: receipt_projection
