    inputs:
      - registry: types
        id: artifact_constructor_reserved
        role: required
    premises:
      - operator: present
        operands:
          - registry: types
            id: artifact_constructor_reserved
        quantifier: exactly_one
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: types
          id: artifact_constructor_reserved
