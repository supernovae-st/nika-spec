        role: required
    premises:
      - operator: equals
        operands:
          - registry: ir
            id: declared_permits
          - registry: ir
            id: required_capabilities
        quantifier: forall
      - operator: present
        operands:
          - registry: ir
            id: declaration_provenance_inferred
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: declared_permits
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: declared_permits
      independent_judgment: true
    domain_payload:
      kind: authority
      sets: ["DeclaredPermits", "RequiredCapabilities"]
      relation: equality
