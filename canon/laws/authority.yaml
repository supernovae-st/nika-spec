  # ── R12 chapeau + point 6 · EffectiveAuthority = Required ∩ Available ─────────

  - id: LAW-AUTH-0305
    slug: authority/effective-authority-minimal-intersection
    status: reserved
    owner: spec
    domain: AUTH
    title: "L'autorite accordee est minimale : l'intersection du requis et du disponible"
    prose_projection:
      chapters: ["10-authority"]
      text: "R12 chapeau verbatim : « Je refuse à la fois le \"floor ambiant\" silencieux et le global default-deny qui rendrait chaque hello-world inutilement verbeux. La loi unique est fondée sur quatre ensembles : RequiredCapabilities(program) · DeclaredPermits(program) · AvailableAuthority(deployment) · EffectiveAuthority(run). » · R12 point 6 verbatim : « L'autorité réellement accordée est minimale : EffectiveAuthority = RequiredCapabilities ∩ AvailableAuthority »"
    inputs:
      - registry: ir
        id: required_capabilities
        role: required
      - registry: ir
        id: available_authority
        role: required
    premises:
      - operator: equals
        operands:
          - registry: ir
            id: effective_authority
          - registry: ir
            id: granted_minimum
            derivation:
              function: intersection
              args:
                - registry: ir
                  id: required_capabilities
                - registry: ir
                  id: available_authority
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: effective_authority
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: effective_authority
      independent_judgment: true
    domain_payload:
      kind: authority
      sets: ["RequiredCapabilities", "AvailableAuthority", "EffectiveAuthority"]
      relation: intersection
      pipeline_stage: effective
    diagnostics: []
    fixtures:
      - conformance/tests/runtime/permits/001-runtime-boundary-hit
      - to-mint-c1/conformance/authority/effective/minimal-intersection
    projections: ["prose:10-authority", "cli:check", "cli:inspect", "sdk"]
    implementation_surfaces:
      - engine:nika-engine
      - reference:authority_core.py
      - conformance:authority-suite
    introduced_in: C0
    proof_obligations:
      - "R12 point 6 verbatim : « L'autorité réellement accordée est minimale : EffectiveAuthority = RequiredCapabilities ∩ AvailableAuthority » La premise equals épèle la formule via la derivation intersection, jamais une string libre."
      - "La fixture 001-runtime-boundary-hit prouve que la borne effective tient aussi au run (defense-in-depth de la borne minimale)."
    closure_gates:
      - effective-equals-intersection

