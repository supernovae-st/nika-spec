        - registry: ir
          id: available_authority
      independent_judgment: true
    domain_payload:
      kind: authority
      sets: ["RequiredCapabilities", "DeclaredPermits", "AvailableAuthority"]
      relation: subset
      pipeline_stage: deployment_check
    diagnostics: ["NIKA-AUTH-001"]
    fixtures:
      - to-mint-c1/conformance/authority/deployment/available-covers-required
    negative_fixtures:
      - to-mint-c1/conformance/authority/deployment/insufficient-deployment
    projections: ["prose:10-authority", "cli:check", "cli:inspect", "sdk"]
    implementation_surfaces:
      - engine:nika-engine
      - reference:authority_core.py
      - conformance:authority-suite
    introduced_in: C0
