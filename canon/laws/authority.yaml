        id: required_capabilities
        role: required
      - registry: ir
        id: declared_permits
        role: required
      - registry: ir
        id: available_authority
        role: required
    premises:
      - operator: subset_of
        operands:
          - registry: ir
            id: required_capabilities
          - registry: ir
            id: available_authority
        quantifier: forall
      - operator: subset_of
        operands:
          - registry: ir
            id: declared_permits
          - registry: ir
            id: available_authority
        quantifier: forall
    conclusion:
      verdict: admit
      diagnostics_on_refuse: ["NIKA-AUTH-001"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
