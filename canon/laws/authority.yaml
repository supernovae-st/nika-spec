# canon/laws/authority.yaml · C0 IMPORT · R12 capability model + R9 points 10-20 +
# N2-a + F1/F2 keep-hardened
# SSOT: RULINGS_2026-07-15.md §R12 (30 points · verbatim · JAMAIS paraphrasé) + §R9
# points 10-20 + mini-gates/ANNEX_2026-07-17_minigates-winners.md (D-2026-07-17-N2 ·
# N2-a + table F1/F2 + §Réservations négatives). Les citations reproduisent les bytes
# des rulings (trois normalisations de FORME markdown seulement, sens intact : dé-wrap
# des retours de ligne · dé-échappement des pipes de cellules de table « \| » → « | » ·
# espaces d'alignement de bloc code réduits à un espace); les ancres sont "R12 point N",
# "R9 point N", "ANNEX §N2-a", "ANNEX table F1/F2", "ANNEX §Réservations négatives".
# Schema: schemas/law.schema.json (SCELLÉ · consommé as-is). Bloc d'ids réservé au
# groupe: LAW-AUTH-03xx.
#
# FINDING-AUTH-01 (SSOT-1 §29 · mapping de domaine, jamais silencieux) : les lois
# N2-a/F1/F2 (famille secrets : provenance · déclassification) sont mappées sur le
# domaine AUTH (le bloc du groupe). Le DOMAIN enum scellé n'a pas de domaine SECRETS
# et l'authorityPayload (sets/relation/pipeline_stage) n'a pas de variante provenance.
# Justification : R6 point 2 (un secret = "une store-reference gouvernée" portant
# "provenance ; confidentialité ; taint ; autorité de résolution ; egress/
# declassification") + R8 loi 10 ("ne jamais confondre provenance, autorité et
# destination de déclassification") placent la famille dans le plan autorité. Le
# squelette payload des lois 0321-0323 est donc approximatif; le verbatim porte la loi.
#
# FINDING-AUTH-02 (codes) : NIKA-AUTH-001..005, NIKA-SEC-008 sont c0-proposed
# (SSOT-2 B.21 : tout rejet normatif exposé exige un diagnostic canonique) et
# renumérotables avant C1. Codes LIVE réutilisés tels quels : NIKA-SEC-004 (boundary
# permits au check, fixture envelope/permits-net-absent l'atteste), NIKA-POLICY-001
# (hard policy rule · allow.providers), NIKA-PARSE-005 (unknown field · closed set ·
# fixture policy/009), NIKA-SEC-006/NIKA-SEC-007 (secret flow/egress).
#
# FINDING-AUTH-03 (generated_facts en registry ir) : les registres capacitaires
# (required_capabilities, effective_authority, ...) ne sont pas seedés au canon
# sandbox et ce fichier n'a pas le droit d'écrire hors canon/laws/. Les refs utilisent
# registry: ir, exempt par design du compiler ("ir refs are runtime/IR symbols
# (unresolvable in canon by design, like the sealed examples' required_capabilities)").
# Migration vers des rows seedées à C1.
#
# FINDING-AUTH-04 (informatif · surface LIVE vs R12) : la surface actuelle (spec/01
# §permits + NIKA-SEC-004 "effect outside the declared permits: capability boundary" +
# les fixtures envelope/permits-*) traite permits: comme LA boundary d'enforcement.
# R12 la requalifie enveloppe déclarative qui n'est "jamais la source réelle du grant
# runtime" (le grant réel = EffectiveAuthority = RequiredCapabilities ∩
# AvailableAuthority). La note SUPERSEDE du ruling n'abolit explicitement que le
# two-mode de 01:382-384; la requalification touche toute la surface 01 §permits.
# Cascade P-C owed; aucune réécriture ici.
#
# FINDING-AUTH-05 (em dash · citations) : ma prose = zéro em dash; les citations
# verbatim reproduisent les bytes des rulings, em dashes inclus quand la source en
# porte (précédent : le pilote R11 cite la note P5 avec ses em dashes).
#
# FINDING-AUTH-06 (LAW-AUTH-0324 · post-C0) : la loi « absent = zéro autorité »
# arrive par NEP-0003 (lane F-O8 · ratifiée op 2026-07-22), hors import C0 :
# première loi du groupe au statut active. Elle tombstone LAW-AUTH-0306 (status
# retired · replaced_by LAW-AUTH-0324 · le verbatim R12 points 8+9 reste cité dans
# la row retirée, mémoire du processus) et laisse LAW-AUTH-0307 (published : bloc
# explicite même vide) strictement plus forte que le floor. NIKA-AUTH-006 rejoint
# les codes c0-proposed de FINDING-AUTH-02 (renumérotables avant C1).
#
# Directive de clôture R12, verbatim : « Grave cette loi dans le ruling, le canon, la
# conformance, le manifest de capabilities, le modèle de référence, le runtime et les
# receipts avant implémentation. » Ce fichier est l'étape canon de cette gravure.

laws_document_format: 1

group: c0-authority

laws:

  # ── R12 points 1 + 17 · l'inférence est la seule source de Required ──────────

  - id: LAW-AUTH-0301
    slug: authority/required-capabilities-inferred
    status: reserved
    owner: spec
    domain: AUTH
    title: "RequiredCapabilities est toujours inféré depuis le Semantic IR, manifests inclus"
    prose_projection:
      chapters: ["10-authority"]
      text: "R12 point 1 verbatim : « Le compilateur infère toujours RequiredCapabilities depuis le Semantic IR. » · R12 point 17 verbatim : « Les callable/tool manifests participent à l'inférence des capacités. » Cette loi fait de l'inférence l'unique origine de l'ensemble Required; aucun champ manuel ne le remplace."
    inputs:
      - registry: ir
        id: semantic_ir
        role: required
      - registry: ir
        id: callable_tool_manifests
        role: required
    premises:
      - operator: derived_from
        operands:
          - registry: ir
            id: required_capabilities
          - registry: ir
            id: semantic_ir
        quantifier: forall
      - operator: derived_from
        operands:
          - registry: ir
            id: required_capabilities
          - registry: ir
            id: callable_tool_manifests
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: required_capabilities
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: required_capabilities
      independent_judgment: true
    domain_payload:
      kind: authority
      sets: ["RequiredCapabilities"]
      relation: equality
      pipeline_stage: infer
    diagnostics: []
    fixtures:
      - conformance/tests/runtime/permits/002-empty-permits-pure-compute
      - to-mint-c1/conformance/authority/inference/tool-manifest-participates
    projections: ["prose:10-authority", "schema", "cli:check", "cli:inspect", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-engine
      - reference:authority_core.py
      - cli:nika-check
      - conformance:authority-suite
    introduced_in: C0
    proof_obligations:
      - "R12 point 1 verbatim : « Le compilateur infère toujours RequiredCapabilities depuis le Semantic IR. » La fixture pure-compute dérive Required vide sans aucune déclaration."
      - "R12 point 17 verbatim : « Les callable/tool manifests participent à l'inférence des capacités. » La fixture tool-manifest-participates prouve qu'un manifest externe injecte sa capability dans Required."
    closure_gates:
      - inference-sole-origin-of-required

  # ── R12 points 2 + 7 · permits est une enveloppe, jamais le grant ─────────────

  - id: LAW-AUTH-0302
    slug: authority/declared-permits-envelope-never-grant
    status: reserved
    owner: spec
    domain: AUTH
    title: "permits est une enveloppe declarative certifiable, jamais la source du grant runtime"
    prose_projection:
      chapters: ["10-authority", "01-envelope"]
      text: "R12 point 2 verbatim : « `permits:` est une enveloppe déclarative et certifiable de l'auteur. Ce n'est jamais la source réelle du grant runtime. » · R12 point 7 verbatim : « DeclaredPermits ne peut jamais augmenter EffectiveAuthority. » EffectiveAuthority ne dérive que de Required et Available (loi 0305); Declared gate sans jamais accorder."
    inputs:
      - registry: ir
        id: declared_permits
        role: required
    premises:
      - operator: derived_from
        operands:
          - registry: ir
            id: effective_authority
          - registry: ir
            id: required_capabilities
        quantifier: forall
      - operator: derived_from
        operands:
          - registry: ir
            id: effective_authority
          - registry: ir
            id: available_authority
        quantifier: forall
    conclusion:
      verdict: record
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: declared_permits
      independent_judgment: true
    domain_payload:
      kind: authority
      sets: ["DeclaredPermits", "EffectiveAuthority"]
      relation: subset
      pipeline_stage: permits_check
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/authority/envelope/declared-superset-never-granted
    projections: ["prose:10-authority", "schema", "cli:check", "cli:inspect", "sdk"]
    implementation_surfaces:
      - engine:nika-engine
      - reference:authority_core.py
      - conformance:authority-suite
    introduced_in: C0
    proof_obligations:
      - "R12 point 7 verbatim : « DeclaredPermits ne peut jamais augmenter EffectiveAuthority. » La fixture declared-superset-never-granted déclare plus que requis et observe que l'excédent n'est jamais accordé au run."
      - "FINDING-AUTH-04 : la surface LIVE spec/01 §permits traite permits: comme la boundary d'enforcement; R12 point 2 la requalifie enveloppe. La cascade P-C réécrit 01 §permits; cette loi est la cible."
    closure_gates:
      - declared-never-grants

  # ── R12 points 3 + 14 · Required ⊆ Declared quand permits est présent ─────────

  - id: LAW-AUTH-0303
    slug: authority/required-subset-declared
    status: reserved
    owner: spec
    domain: AUTH
    title: "Quand permits est present, toute capacite requise doit etre declaree"
    prose_projection:
      chapters: ["10-authority", "01-envelope"]
      text: "R12 point 3 verbatim : « Lorsqu'il est présent : RequiredCapabilities ⊆ DeclaredPermits » · R12 point 14 verbatim : « Une capacité requise mais non déclarée est une erreur. » Le code vivant de cette classe au check est NIKA-SEC-004 (la fixture permits-net-absent l'atteste : bloc présent, net requis non déclaré, refus au check)."
    inputs:
      - registry: ir
        id: required_capabilities
        role: required
      - registry: ir
        id: declared_permits
        role: required
    premises:
      - operator: subset_of
        operands:
          - registry: ir
            id: required_capabilities
          - registry: ir
            id: declared_permits
        quantifier: forall
    conclusion:
      verdict: admit
      diagnostics_on_refuse: ["NIKA-SEC-004"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: required_capabilities
      independent_judgment: true
    domain_payload:
      kind: authority
      sets: ["RequiredCapabilities", "DeclaredPermits"]
      relation: subset
      pipeline_stage: permits_check
    diagnostics: ["NIKA-SEC-004"]
    fixtures:
      - conformance/tests/runtime/permits/002-empty-permits-pure-compute
    negative_fixtures:
      - conformance/envelope/permits-net-absent.nika.yaml
      - conformance/envelope/permits-exec-absent.nika.yaml
      - conformance/envelope/permits-tool-not-listed.nika.yaml
      - conformance/envelope/permits-fs-read-escape.nika.yaml
      - conformance/envelope/permits-fs-write-escape-absolute.nika.yaml
    projections: ["prose:10-authority", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-engine
      - reference:authority_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:authority-suite
    introduced_in: C0
    proof_obligations:
      - "R12 point 14 verbatim : « Une capacité requise mais non déclarée est une erreur. » Chaque fixture négative porte exactement une capacité requise hors de DeclaredPermits et refuse au check."
    closure_gates:
      - required-subset-declared-enforced

  # ── R12 points 4 + 5 + 15 · le deployment fournit Available, vérifié avant run ─

  - id: LAW-AUTH-0304
