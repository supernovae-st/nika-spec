    inputs:
      - registry: ir
        id: required_backend_capabilities
        role: required
      - registry: ir
        id: effective_backend_capabilities
        role: ceiling
    premises:
      - operator: subset_of
        operands:
          - registry: ir
            id: required_backend_capabilities
          - registry: ir
            id: effective_backend_capabilities
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: required_backend_capabilities
      independent_judgment: true
    domain_payload:
      kind: conformance
      constraint: profile_membership
      subject:
        registry: ir
        id: backend_capability_compatibility
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/features/deploy/required-subset-effective
    negative_fixtures:
      - to-mint-c1/conformance/features/deploy/required-exceeds-effective
    projections: ["prose:07-conformance", "cli:check", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:features_core.py
      - cli:nika-check
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "La loi se juge avant le run contre le capability manifest du deployment ; une incompatibilité refuse avant exécution (R7 point 11)."
    closure_gates:
      - fixture-parity
      - fail-before-execution

  # ─────────────────── R7 point 8 · trois catégories séparées ───────────────────

  - id: LAW-SURFACE-0512
    slug: features/three-categories-separated
    status: reserved
    owner: spec
    domain: SURFACE
    title: "Features de langage, runtime capabilities et backend capabilities sont trois familles disjointes"
    prose_projection:
      chapters: ["07-conformance"]
      text: "R7 point 8 verbatim : « Features de langage, runtime capabilities et backend capabilities sont trois catégories séparées. » Chaque entrée du registre appartient à exactement une famille ; aucune entrée ne vit dans deux catégories."
    inputs:
      - registry: ir
        id: language_feature_family
        role: required
      - registry: ir
        id: runtime_capability_family
        role: required
      - registry: ir
        id: backend_capability_family
        role: required
    premises:
      - operator: intersect_empty
        operands:
          - registry: ir
            id: language_feature_family
          - registry: ir
            id: runtime_capability_family
          - registry: ir
            id: backend_capability_family
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: feature_category_taxonomy
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: family_membership
      subject:
        registry: ir
        id: feature_category_taxonomy
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/features/registry/categories-disjoint
    projections: ["prose:07-conformance", "schema", "cli:check", "docs"]
    implementation_surfaces:
      - reference:features_core.py
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "Le champ kind du registre (featureRow scellé) porte la famille ; le gate refuse toute row dont le kind n'appartient pas à exactement une des trois catégories."
    closure_gates:
      - categories-disjoint

  # ─────────────────── R7 point 9 · le registre canonique ───────────────────────

  - id: LAW-GRAMMAR-0511
    slug: features/registry-row-shape
    status: reserved
    owner: spec
    domain: GRAMMAR
    title: "Le registre canonique unique des features impose la forme de row du ruling"
    prose_projection:
      chapters: ["07-conformance"]
      text: "R7 point 9 verbatim : « La spec possède un registre canonique unique, par exemple : `canon/features.yaml` Chaque entrée possède : id namespacé ; kind ; status ; owner ; introduced_in ; détection ; conformance ; replacement éventuel. » FINDING-C enregistré : le schema scellé featureRow épelle detection_law (détection) · conformance_profile (conformance) · replaced_by (replacement éventuel) et exige en plus law_ids ; la row seed yaml_profile_strict n'a pas d'id namespacé. Mapping documenté, arbitrage owed à l'import registre."
    inputs:
      - registry: features
        id: yaml_profile_strict
        role: exemplar
      - registry: ir
        id: features_registry_rows
        role: required
    premises:
      - operator: conforms_to
        operands:
          - registry: ir
            id: features_registry_rows
          - registry: ir
            id: feature_row_shape
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: feature_row_shape
      independent_judgment: true
    domain_payload:
      kind: grammar
      position: features_registry_row
      field_rules:
        - field: id
          cardinality: required
        - field: kind
          cardinality: required
        - field: status
          cardinality: required
        - field: owner
          cardinality: required
        - field: introduced_in
          cardinality: required
        - field: detection_law
          cardinality: required
        - field: conformance_profile
          cardinality: required
        - field: replaced_by
          cardinality: optional
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/features/registry/row-shape-complete
    projections: ["prose:07-conformance", "schema", "cli:check", "docs"]
    implementation_surfaces:
      - reference:features_registry_gate.py
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "Le registre est UNIQUE : canon/features.yaml est l'owner canonique, aucun second inventaire de features n'existe sur aucune surface."
      - "La row exemplaire seedée yaml_profile_strict satisfait la forme (detection_law: LAW-GRAMMAR-0101 · conformance_profile: core) ; l'import réel R7 remplace son wiring placeholder."
    closure_gates:
      - registry-unique-owner
      - row-shape-enforced

