# canon/laws/features.yaml · C0 IMPORT · R7 feature detection
# SSOT: RULINGS_2026-07-15.md §R7 (18 points numérotés + le paragraphe final · verbatim ·
# JAMAIS paraphrasé, les citations reproduisent les bytes du ruling, ancres "R7 point N").
# Schema: schemas/law.schema.json (SCELLÉ · consommé as-is). Bloc d'ids du groupe :
# SURFACE 05xx · GRAMMAR 05xx · CONF 05xx · MIGR 05xx (0510-0519 réservés à features).
# Couverture : 18/18 points portés (p1+p15 → SURFACE-0510 · p2+p16 → GRAMMAR-0510 ·
# p3+paragraphe final → SURFACE-0511 · p4+p5 → CONF-0510 · p6 → CONF-0511 · p7 →
# CONF-0512 · p8 → SURFACE-0512 · p9 → GRAMMAR-0511 · p10+p17 → CONF-0513 · p11+p12 →
# CONF-0514 · p13 → GRAMMAR-0512 · p14 → SURFACE-0513 · p18 → CONF-0515).
#
# FINDING-C (SSOT-1 §29 · mapping documenté, jamais silencieux) : R7 point 9 nomme les
# champs "id namespacé ; kind ; status ; owner ; introduced_in ; détection ; conformance ;
# replacement éventuel". Le schema SCELLÉ registries.schema.json#featureRow épelle :
# detection_law (détection) · conformance_profile (conformance) · replaced_by (replacement
# éventuel) · et exige EN PLUS law_ids (absent du ruling · l'ajout implémente SSOT-1 §10).
# La row seed yaml_profile_strict n'a pas de séparateur de namespace dans son id alors que
# le ruling demande "id namespacé" (machineId admet le point : namespacing possible).
# À arbitrer à l'import registre réel, jamais tranché ici.
#
# Refs : les symboles feature (required_language_features · ...) n'ont AUCUNE row seedée
# hors la row exemplaire features/yaml_profile_strict : ils vivent en registry ir
# (convention sandbox du compiler) · l'inventaire réel des rows features est owed (le
# header du registre le dit : "l'import R7 réel remplace à C0").

laws_document_format: 1

group: r7-feature-detection

laws:

  # ─────────────────── R7 points 1 + 15 · le marqueur unique ────────────────────

  - id: LAW-SURFACE-0510
    slug: features/source-marker-only-v1
    status: reserved
    owner: spec
    domain: SURFACE
    title: "La source Nika conserve uniquement le marqueur nika v1, aucun nika v2"
    prose_projection:
      chapters: ["01-envelope"]
      text: "R7 point 1 verbatim : « La source Nika conserve uniquement : `nika: v1` » · R7 point 15 verbatim : « Aucun `nika: v2`. » La détection de features ne passe JAMAIS par un bump du marqueur de langage : la source ne porte aucun autre marqueur de version, et aucun second marqueur n'existera."
    inputs:
      - registry: surface
        id: nika_version_marker
        role: required
      - registry: grammar
        id: envelope_nika_field
        role: ceiling
    premises:
      - operator: matches
        operands:
          - registry: surface
            id: nika_version_marker
          - registry: grammar
            id: envelope_nika_field
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: surface
          id: nika_version_marker
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: one_spelling_per_meaning
      subject:
        registry: surface
        id: nika_version_marker
    diagnostics: []
    fixtures:
      - conformance/envelope/minimal-valid-workflow.nika.yaml
    negative_fixtures:
      - conformance/envelope/parse-bad-version.nika.yaml
    projections: ["prose:01-envelope", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:envelope_core.py
      - cli:nika-check
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "R7 point 15 verbatim : « Aucun `nika: v2`. » Tout marqueur autre que v1 refuse à l'enveloppe (fixture réelle parse-bad-version)."
      - "Sœur de LAW-SURFACE-0101 (R11 point 16) : même marqueur, ruling distinct, chaque loi cite SON ancre."
    closure_gates:
      - single-language-marker

  # ─────────────────── R7 points 2 + 16 · aucun champ manuel ────────────────────

  - id: LAW-GRAMMAR-0510
    slug: features/requires-features-field-forbidden
    status: reserved
    owner: spec
    domain: GRAMMAR
    title: "Aucun champ manuel requires_features n'existe dans la grammaire du workflow"
    prose_projection:
      chapters: ["01-envelope"]
      text: "R7 point 2 verbatim : « Aucun champ manuel `requires_features:` n'est ajouté au workflow. » · R7 point 16 verbatim : « Aucun `requires_features:` manuel. » La clé n'entre jamais dans la grammaire publique : un auteur qui l'écrit tombe sur le refus unknown-field du mode strict."
    inputs:
      - registry: ir
        id: requires_features_key_event
        role: required
    premises:
      - operator: present
        operands:
          - registry: ir
            id: requires_features_key_event
        quantifier: exists
    conclusion:
      verdict: refuse
      diagnostics_on_refuse: ["NIKA-PARSE-005"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: feature_requirement_sets
      independent_judgment: true
    domain_payload:
      kind: grammar
      position: workflow_envelope
      field_rules:
        - field: requires_features
          cardinality: forbidden
    diagnostics: ["NIKA-PARSE-005"]
    fixtures:
      - conformance/envelope/minimal-valid-workflow.nika.yaml
    negative_fixtures:
      - conformance/envelope/parse-unknown-field.nika.yaml
      - to-mint-c1/conformance/features/invalid/requires-features-key
    projections: ["prose:01-envelope", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:envelope_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "NIKA-PARSE-005 est le code réel du refus unknown-field en mode strict (fixture réelle conformance/envelope/parse-unknown-field.nika.yaml : « INTENT: NIKA-PARSE-005 (unknown field in strict mode) ») : requires_features en est une instance, jamais une clé connue."
      - "R7 point 17 verbatim : « Aucun second système de vérité. » Un champ manuel serait une seconde vérité contre l'inférence IR de LAW-SURFACE-0511."
    closure_gates:
      - fixture-parity
      - requires-features-census-zero

  # ─────────────── R7 point 3 + paragraphe final · l'inférence IR ───────────────

  - id: LAW-SURFACE-0511
    slug: features/requirements-derived-from-semantic-ir
    status: reserved
    owner: spec
    domain: SURFACE
    title: "Les exigences de features sont dérivées du Semantic IR, jamais déclarées"
    prose_projection:
      chapters: ["07-conformance"]
      text: "R7 point 3 verbatim : « Le compilateur déduit automatiquement depuis le Semantic IR : required_language_features ; required_runtime_capabilities ; required_backend_capabilities. » Paragraphe final verbatim : « Si une exigence future n'est réellement pas inférable depuis le Semantic IR, elle devra d'abord être modélisée dans le deployment/control plane, pas automatiquement ajoutée à la grammaire Nika. » Les trois ensembles requis sont une surface dérivée : leur seule voie d'existence est l'inférence."
    inputs:
      - registry: ir
        id: semantic_ir
        role: required
    premises:
      - operator: derived_from
        operands:
          - registry: ir
            id: required_feature_sets
          - registry: ir
            id: semantic_ir
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: required_feature_sets
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: required_feature_sets
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: exposure_rule
      subject:
        registry: ir
        id: required_feature_sets
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/features/derive/requirements-from-ir
    projections: ["prose:07-conformance", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:features_core.py
      - cli:nika-check
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "Même fichier, même Semantic IR : mêmes ensembles requis, octet pour octet (la dérivation est déterministe)."
      - "Paragraphe final verbatim : « Grave cette architecture dans le ruling, le canon, le manifest schema, la conformance et le plan de migration avant implémentation. » Ce fichier est la gravure canon ; manifest schema et plan de migration sont P-A owed."
    closure_gates:
      - derivation-deterministic
      - no-authored-requirement-set

  # ─────────────────── R7 points 4 + 5 · les deux commandes ─────────────────────

  - id: LAW-CONF-0510
    slug: features/manifest-and-inspect-official
    status: reserved
    owner: spec
    domain: CONF
    title: "Le manifest engine et l'inspection workflow sont des surfaces machine officielles vérifiées"
    prose_projection:
      chapters: ["07-conformance"]
      text: "R7 point 4 verbatim : « L'engine expose un manifest machine-readable officiel : `nika features --format json` » · R7 point 5 verbatim : « Le workflow peut être inspecté par : `nika inspect <file> --requirements --format json` » Les deux sorties sont jugées contre la même SSOT : le manifest reflète les features supportées déclarées au registre, l'inspection reflète les ensembles dérivés du Semantic IR."
    inputs:
      - registry: ir
        id: engine_feature_manifest
        role: required
      - registry: ir
        id: inspect_requirements_output
        role: required
    premises:
      - operator: derived_from
        operands:
          - registry: ir
            id: engine_feature_manifest
          - registry: ir
            id: features_registry_projection
        quantifier: forall
      - operator: equals
        operands:
          - registry: ir
            id: inspect_requirements_output
          - registry: ir
            id: required_feature_sets
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["jcs"]
    judgment:
      generated_facts:
        - registry: ir
          id: engine_feature_manifest
      independent_judgment: true
    domain_payload:
      kind: conformance
      constraint: engine_reference_parity
      subject:
        registry: ir
        id: feature_manifest_parity
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/features/cli/features-manifest-json
      - to-mint-c1/conformance/features/cli/inspect-requirements-json
    projections: ["prose:07-conformance", "cli:features", "cli:inspect", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-cli
      - reference:features_core.py
      - cli:nika-features
      - cli:nika-inspect
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "Le manifest et l'inspection rendent du JSON stable (format machine versionné par LAW-SURFACE-0513), comparé byte à byte par la suite différentielle."
    closure_gates:
      - fixture-parity
      - manifest-format-versioned

  # ─────────────────── R7 point 6 · la loi de compatibilité ─────────────────────

  - id: LAW-CONF-0511
    slug: features/language-compatibility-law
    status: reserved
    owner: spec
    domain: CONF
    title: "Un programme n'est compatible que si ses features de langage requises sont supportées par l'engine"
    prose_projection:
      chapters: ["07-conformance"]
      text: "R7 point 6 verbatim : « La loi de compatibilité est : RequiredLanguageFeatures(program) ⊆ SupportedLanguageFeatures(engine) » L'inclusion est jugée avant exécution ; un ensemble requis non inclus refuse."
    inputs:
      - registry: ir
        id: required_language_features
        role: required
      - registry: ir
        id: supported_language_features
        role: ceiling
    premises:
      - operator: subset_of
        operands:
          - registry: ir
            id: required_language_features
          - registry: ir
            id: supported_language_features
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: required_language_features
      independent_judgment: true
    domain_payload:
      kind: conformance
      constraint: profile_membership
      subject:
        registry: ir
        id: language_feature_compatibility
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/features/compat/required-subset-supported
    negative_fixtures:
      - to-mint-c1/conformance/features/compat/required-exceeds-supported
    projections: ["prose:07-conformance", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:features_core.py
      - cli:nika-check
      - conformance:features-suite
    introduced_in: C0
    proof_obligations:
      - "R7 point 12 verbatim : « Aucun warning permissif, aucune approximation et aucune détection fondée uniquement sur semver. » L'inclusion se juge sur les ensembles inférés, jamais sur une comparaison de versions."
    closure_gates:
      - fixture-parity
      - fail-before-execution

  # ─────────────────── R7 point 7 · la loi de déploiement ───────────────────────

  - id: LAW-CONF-0512
