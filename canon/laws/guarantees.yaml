    projections: ["prose:15-proof", "schema", "cli:check", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "R10 point 25 nomme la classe « Unknown propagation » ; la fixture prouve qu'une dimension absente lit Unknown sur toutes les surfaces, jamais true."
    closure_gates:
      - unknown-default-proven

  # ─────────────── R10 point 9 · aucune auto-attribution ───────────────────────

  - id: LAW-GUAR-0407
    slug: r10/no-self-attributed-guarantee
    status: reserved
    owner: spec
    domain: GUAR
    title: "Aucun modele, provider, tool ou backend ne s'auto-attribue une garantie sans evidence"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 9 verbatim : « Un modèle, provider, tool ou backend ne peut pas s'auto-attribuer une garantie sans evidence vérifiable. » Une declaration tierce sans evidence verifiable refuse ; elle ne retombe meme pas a Unknown en silence, elle est refusee comme claim illegal."
    inputs:
      - registry: ir
        id: third_party_guarantee_claims
        role: required
    premises:
      - operator: present
        operands:
          - registry: ir
            id: self_attributed_guarantee_without_evidence
        quantifier: exists
    conclusion:
      verdict: refuse
      diagnostics_on_refuse: ["NIKA-GUAR-001"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: evidence_levels
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: ["NIKA-GUAR-001"]
    fixtures:
      - to-mint-c1/conformance/guarantees/evidence-backed-claim
    negative_fixtures:
      - to-mint-c1/conformance/guarantees/self-attribution-refused
    projections: ["prose:15-proof", "cli:check", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - cli:nika-check
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "Les manifests de tools/providers participent a l'inference (R12 point 17) mais leurs claims de garantie sans evidence sont refuses : participer n'est pas s'auto-certifier."
      - "FINDING-G2 : NIKA-GUAR-001 est c0-proposed, renumerotable avant C1."
    closure_gates:
      - no-self-certification
      - fixture-parity

  # ─────────────── R10 point 10 · composition conservative meet ────────────────

  - id: LAW-GUAR-0408
    slug: r10/conservative-meet-composition
    status: reserved
    owner: spec
    domain: GUAR
    title: "Les garanties se composent conservativement, la composition ne depasse pas le meet des enfants"
    prose_projection:
      chapters: ["14-composition", "15-proof"]
      text: "R10 point 10 verbatim : « Les garanties se composent conservativement. En général : Guarantees(composition) ≤ meet(Guarantees(children)) avec des lois propres à chaque dimension. » Le meet est la borne superieure de ce que la composition peut affirmer ; les lois propres par dimension (point 25) ne peuvent que rester en dessous."
    inputs:
      - registry: ir
        id: composed_guarantee_profile
        role: required
      - registry: ir
        id: child_guarantee_profile_left
        role: required
      - registry: ir
        id: child_guarantee_profile_right
        role: required
    premises:
      - operator: meet
        operands:
          - registry: ir
            id: composed_guarantee_profile
          - registry: ir
            id: child_guarantee_profile_left
          - registry: ir
            id: child_guarantee_profile_right
        quantifier: forall
        $comment: "Forme target-first du schema scelle : meet(x,a,b) dit x est le meet du treillis de a,b ; le ruling dit <= en general, les lois propres par dimension ne peuvent que descendre sous le meet, jamais monter."
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: composed_guarantee_profile
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: composed_guarantee_profile
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
        - operator: concurrent
          combine: meet
        - operator: retry
          combine: meet
        - operator: recovery
          combine: meet
        - operator: nesting
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/deterministic-children
    negative_fixtures:
      - to-mint-c1/conformance/guarantees/nondeterministic-child
    projections: ["prose:14-composition", "prose:15-proof", "schema", "cli:check", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - reference:composition_core.py
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "Deux enfants deterministes composent au plus deterministe (fixture deterministic-children) ; un enfant non deterministe rabat la composition (fixture nondeterministic-child) : le meet est prouve dans les deux sens."
      - "Les cinq operateurs du payload portent tous combine meet : la regle generale du point 10 ; toute regle meet_then_cap par dimension arrive avec les lois propres du point 25 (LAW-GUAR-0416), jamais inventee ici."
    closure_gates:
      - conservative-meet-proven
      - fixture-parity

  # ─────────────── R10 points 11 + 15 + 16 + 17 · proprietes distinctes ────────

  - id: LAW-GUAR-0409
    slug: r10/properties-distinct-no-implication
    status: reserved
    owner: spec
    domain: GUAR
    title: "Determinism, idempotence, purity, replayability, boundedness restent distincts, aucune implication gratuite"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 11 verbatim : « Determinism, idempotence, purity, replayability et boundedness restent des propriétés distinctes. » · R10 point 15 verbatim : « Un callable sans effet n'est pas automatiquement déterministe. » · R10 point 16 verbatim : « Un callable déterministe n'est pas automatiquement idempotent. » · R10 point 17 verbatim : « Un callable idempotent n'est pas automatiquement pur. »"
    inputs:
      - registry: grammar
        id: guarantee_dimensions
        role: required
      - registry: grammar
        id: purity_property
        role: required
    premises:
      - operator: not_equals
        operands:
          - registry: grammar
            id: determinism_dimension
          - registry: grammar
            id: idempotence_dimension
        quantifier: forall
      - operator: not_equals
        operands:
          - registry: grammar
            id: idempotence_dimension
          - registry: grammar
            id: purity_property
        quantifier: forall
      - operator: not_equals
        operands:
          - registry: grammar
            id: replayability_dimension
          - registry: grammar
            id: boundedness_dimension
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: guarantee_dimensions
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: idempotence
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/no-implication-chain
    projections: ["prose:15-proof", "cli:check", "docs"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "La fixture presente un callable sans effet non deterministe, un deterministe non idempotent et un idempotent non pur : les trois non-implications des points 15-17 sont chacune realisees par un contre-exemple."
      - "FINDING-G3 : purity est une PROPRIETE distincte nommee par le point 11, pas une dimension du profil (absente du minimum du point 3 et de l'enum scelle)."
    closure_gates:
      - no-implication-counterexamples

