# canon/laws/guarantees.yaml · C0 import · R10 delta = GuaranteeProfile
# SSOT: RULINGS_2026-07-15.md §R10 (preambule + 27 points · verbatim · JAMAIS paraphrase,
# les citations reproduisent les bytes du ruling, ancres "R10 preambule" / "R10 point N").
# Schema: schemas/law.schema.json (SCELLE · consomme as-is). Bloc d'ids de ce groupe:
# GUAR 04xx.
#
# FINDING-G1 (forme du schema vs lois non-compositionnelles · precedent FINDING-11 du
# pilote) : guaranteePayload exige operator_rules (minItems 1) sur CHAQUE loi GUAR, meme
# non compositionnelle (ex. l'interdiction de cle delta:). Convention de ce fichier :
# les lois non compositionnelles portent la regle conservatrice par defaut
# [{operator: sequential, combine: meet}], fondee verbatim sur R10 point 10 (composition
# conservative meet). De meme, guaranteePayload.dimension pinne UN exemplaire ; la
# famille complete des dimensions vit en inputs (grammar/guarantee_dimensions).
#
# FINDING-G2 (codes c0-proposed · precedent FINDING-05 du pilote) : R10 ne mandate aucun
# code machine. NIKA-GUAR-001 (garantie auto-attribuee sans evidence verifiable · point
# 9), NIKA-GUAR-002 (claim depassant l'evidence / le demontrable · points 7 + 26) et
# NIKA-GUAR-003 (cle YAML publique delta: refusee · point 22) sont mintes c0-proposed
# (SSOT-2 B.21 : un diagnostic canonique par rejet normatif expose), renumerotables
# avant C1.
#
# FINDING-G3 (frontiere de l'enum dimension · interpretation enregistree, pas une
# contradiction) : R10 point 3 garde « completion/boundedness si cette propriété est
# conservée » conditionnel et n'admet une autre dimension que « seulement après
# définition formelle ». L'enum scelle du guaranteePayload FERME les dimensions a
# exactement {determinism, idempotence, replayability, boundedness} : il RESOUT le
# conditionnel (boundedness conservee · cohérent R13 qui corrige proof_core.py sur
# bounded) et toute dimension future exige un amendement de schema (loi MIGR). R10
# point 11 nomme aussi « purity » comme PROPRIETE distincte : purity n'est PAS une
# dimension du profil (absente du minimum du point 3 et de l'enum scelle), c'est
# coherent, enregistre ici pour que personne ne l'ajoute en silence.
#
# Fixtures : aucune fixture guarantees n'existe au pin (mesure) ; R10 point 25 nomme
# les 10 classes a minter, chemins to-mint-c1/conformance/guarantees/<classe>.
# Surface reference REELLE : conformance/proof_core.py (la hierarchie d'evidence
# StaticProof/TraceVerified vit dans spec/15-proof.md + R13).

laws_document_format: 1

pilot: r10-guarantee-profile

laws:

  # ─────────────── R10 preambule + points 1 + 2 · delta EST le profil ──────────

  - id: LAW-GUAR-0401
    slug: r10/delta-is-guarantee-profile
    status: reserved
    owner: spec
    domain: GUAR
    title: "delta designe le GuaranteeProfile du CallableContract, la forme nommee est canonique"
    prose_projection:
      chapters: ["15-proof", "14-composition"]
      text: "R10 preambule verbatim : « δ désigne le GuaranteeProfile du CallableContract. La forme canonique principale devient nommée : CallableContract { inputs, outputs, errors, effects, resources, guarantees }. La forme Callable<I, O, E, ε, ρ, δ> reste uniquement une notation formelle compacte et dérivée. » · R10 point 1 verbatim : « δ = GuaranteeProfile. » · R10 point 2 verbatim : « δ ne signifie pas uniquement determinism ou idempotence. »"
    inputs:
      - registry: surface
        id: delta_formal_notation
        role: required
      - registry: grammar
        id: guarantee_profile_named_form
        role: required
      - registry: ir
        id: callable_contract
        role: required
    premises:
      - operator: derived_from
        operands:
          - registry: surface
            id: delta_formal_notation
          - registry: grammar
            id: guarantee_profile_named_form
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: guarantee_profile_named_form
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/named-form-canonical
    projections: ["prose:15-proof", "prose:14-composition", "schema", "docs", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "La notation grecque est DERIVEE de la forme nommee, jamais l'inverse : le sens de la premisse derived_from est directionnel (le compact se derive du canonique)."
      - "FINDING-G1 : dimension exemplaire determinism ; la famille des dimensions vit au registre grammar/guarantee_dimensions (loi LAW-GUAR-0402)."
    closure_gates:
      - named-form-canonical-everywhere

  # ─────────────── R10 point 3 · produit structure de dimensions ───────────────

  - id: LAW-GUAR-0402
    slug: r10/structured-product-of-dimensions
    status: reserved
    owner: spec
    domain: GUAR
    title: "GuaranteeProfile est un produit structure de dimensions independantes, minimum ferme"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 3 verbatim : « GuaranteeProfile est un produit structuré de dimensions indépendantes, au minimum : determinism ; idempotence ; replayability ; completion/boundedness si cette propriété est conservée ; toute autre dimension seulement après définition formelle. » FINDING-G3 : l'enum scelle du schema resout le conditionnel (boundedness conservee) et ferme la porte aux dimensions non definies formellement."
    inputs:
      - registry: grammar
        id: guarantee_minimum_dimensions
        role: required
      - registry: ir
        id: guarantee_profile_dimensions
        role: required
    premises:
      - operator: subset_of
        operands:
          - registry: grammar
            id: guarantee_minimum_dimensions
          - registry: ir
            id: guarantee_profile_dimensions
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["sorted-keys"]
    judgment:
      generated_facts:
        - registry: grammar
          id: guarantee_dimensions
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/product-dimensions-present
    projections: ["prose:15-proof", "schema", "sdk", "docs"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "Une dimension hors enum est refusee par le schema (produit FERME cote machine) ; l'ajout d'une dimension = definition formelle + amendement (loi MIGR), jamais une extension silencieuse."
    closure_gates:
      - dimensions-enum-closed

  # ─────────────── R10 points 4 + 5 · claim, scope, assumptions, evidence ──────

  - id: LAW-GUAR-0403
    slug: r10/claim-scope-assumptions-evidence
    status: reserved
    owner: spec
    domain: GUAR
    title: "Une garantie porte separement claim, scope, assumptions et evidence level"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 4 verbatim : « Une garantie possède séparément : claim ; scope ; assumptions ; evidence level. » · R10 point 5 verbatim : « Ne jamais confondre la propriété affirmée et la force de sa preuve. » Les quatre champs sont des axes distincts de la declaration ; aucun n'infere un autre."
    inputs:
      - registry: ir
        id: guarantee_declaration
        role: required
      - registry: grammar
        id: guarantee_declaration_shape
        role: ceiling
    premises:
      - operator: conforms_to
        operands:
          - registry: ir
            id: guarantee_declaration
          - registry: grammar
            id: guarantee_declaration_shape
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["sorted-keys"]
    judgment:
      generated_facts:
        - registry: grammar
          id: guarantee_declaration_shape
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/declaration-four-fields
    projections: ["prose:15-proof", "schema", "cli:check", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - cli:nika-check
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "R10 point 5 verbatim : « Ne jamais confondre la propriété affirmée et la force de sa preuve. » La fixture refuse une declaration qui fusionne claim et evidence en un seul champ."
    closure_gates:
      - four-fields-separate

  # ─────────────── R10 point 6 · la hierarchie d'evidence reutilisee ───────────

  - id: LAW-GUAR-0404
    slug: r10/evidence-hierarchy-reuse
    status: reserved
    owner: spec
    domain: GUAR
    title: "Les niveaux d'evidence sont StaticProof, TraceVerified, Unknown, aucun second systeme"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 6 verbatim : « Les niveaux d'évidence réutilisent la hiérarchie existante : StaticProof · TraceVerified · Unknown. Aucun second système de preuve concurrent. » La hierarchie existante est celle de spec/15-proof.md ; le profil la consomme, il n'en cree pas une autre."
    inputs:
      - registry: ir
        id: guarantee_evidence_level
        role: required
      - registry: grammar
        id: evidence_levels
        role: ceiling
    premises:
      - operator: member_of
        operands:
          - registry: ir
            id: guarantee_evidence_level
          - registry: grammar
            id: evidence_levels
        quantifier: forall
      - operator: absent
        operands:
          - registry: grammar
            id: second_evidence_system
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: evidence_levels
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/evidence-levels-closed
    projections: ["prose:15-proof", "schema", "cli:check", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "R13 corrige deja proof_core.py (bounded ne se leve plus en StaticProof inconditionnel) : la meme hierarchie sert assert et guarantees, un seul systeme de preuve."
    closure_gates:
      - single-evidence-system

  # ─────────────── R10 point 7 · Strength(claim) <= Strength(evidence) ─────────

  - id: LAW-GUAR-0405
    slug: r10/strength-claim-le-evidence
    status: reserved
    owner: spec
    domain: GUAR
    title: "Loi absolue, la force du claim ne depasse jamais la force de l'evidence"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 7 verbatim : « Loi absolue : Strength(claim) ≤ Strength(evidence) » Aucune surface ne peut admettre une declaration dont le claim est plus fort que sa preuve."
    inputs:
      - registry: ir
        id: claim_strength
        role: required
      - registry: ir
        id: evidence_strength
        role: required
    premises:
      - operator: min_of
        operands:
          - registry: ir
            id: claim_strength
          - registry: ir
            id: claim_strength
          - registry: ir
            id: evidence_strength
        quantifier: forall
        $comment: "Encodage exact du <= dans l'algebre scellee : min_of(x,a,b) dit x = min(a,b) ; avec x = a = claim_strength, claim = min(claim, evidence) equivaut a claim <= evidence."
    conclusion:
      verdict: admit
      diagnostics_on_refuse: ["NIKA-GUAR-002"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: evidence_levels
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: ["NIKA-GUAR-002"]
    fixtures:
      - to-mint-c1/conformance/guarantees/claim-at-evidence
    negative_fixtures:
      - to-mint-c1/conformance/guarantees/claim-above-evidence-refused
    projections: ["prose:15-proof", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - cli:nika-check
      - conformance:guarantee-suite
    introduced_in: C0
    proof_obligations:
      - "R13 applique la meme loi a assert (fragment verbatim : « avec **claim ≤ evidence** — le reste = Unknown, jamais optimiste. ») : les deux surfaces jugent avec la meme inegalite, un seul sens."
      - "FINDING-G2 : NIKA-GUAR-002 est c0-proposed, renumerotable avant C1."
    closure_gates:
      - strength-inequality-enforced
      - fixture-parity

  # ─────────────── R10 point 8 · l'absence signifie Unknown ────────────────────

  - id: LAW-GUAR-0406
    slug: r10/absence-means-unknown
    status: reserved
    owner: spec
    domain: GUAR
    title: "L'absence d'une garantie signifie Unknown, jamais true par defaut"
    prose_projection:
      chapters: ["15-proof"]
      text: "R10 point 8 verbatim : « L'absence d'une garantie signifie Unknown, jamais true par défaut. » Le defaut du produit est Unknown sur chaque dimension non declaree ; aucun optimisme implicite."
    inputs:
      - registry: ir
        id: guarantee_claim_for_dimension
        role: required
    premises:
      - operator: absent
        operands:
          - registry: ir
            id: guarantee_claim_for_dimension
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: guarantee_unknown_default
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
