      - registry: ir
        id: resource_budgets
        role: required
      - registry: ir
        id: behavioral_guarantees
        role: required
    premises:
      - operator: member_of
        operands:
          - registry: ir
            id: effects_declaration
          - registry: ir
            id: epsilon_plane
        quantifier: forall
      - operator: member_of
        operands:
          - registry: ir
            id: resource_budgets
          - registry: ir
            id: rho_plane
        quantifier: forall
      - operator: member_of
        operands:
          - registry: ir
            id: behavioral_guarantees
          - registry: ir
            id: delta_plane
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: delta_plane
      independent_judgment: true
    domain_payload:
      kind: guarantee
      dimension: determinism
      operator_rules:
        - operator: sequential
          combine: meet
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/guarantees/planes-separation
    projections: ["prose:15-proof", "schema", "sdk", "docs"]
    implementation_surfaces:
      - engine:nika
      - reference:proof_core.py
      - conformance:guarantee-suite
