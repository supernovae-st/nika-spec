    slug: outputs/task-extract-replaces-output
    status: reserved
    owner: spec
    domain: GRAMMAR
    title: "Le champ task extract porte les bindings d'extraction, le misnomer output est une forme morte"
    prose_projection:
      chapters: ["03-dag", "01-envelope"]
      text: "R4 verbatim : « Task `output:` → **`extract:`** (le misnomer meurt · la paire singulier/pluriel meurt · le champ graph-node se renomme dans le même format bump). » Empirie au pin : le champ vit en 03-dag:67 (« output: # optional · named jq bindings ») et la paire s'enseigne en 01-envelope:501 « **`outputs:` (envelope · plural) ≠ `output:` (task · singular).** » : cette paire pedagogique meurt avec le rename. Receipt F3 §Migration row verbatim : « R4 quartet (`tasks.X.output` · `tasks.X.out.<n>` · `extract:` · `outputs:`) intact. » L'EXPRESSION tasks.X.output (l'acces record) survit; seul le CHAMP de declaration se renomme."
    inputs:
      - registry: ir
        id: task_output_field
        role: required
    premises:
      - operator: present
        operands:
          - registry: ir
            id: task_output_field
        quantifier: exists
    conclusion:
      verdict: refuse
      diagnostics_on_refuse: ["NIKA-OUT-002"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: task_extract_field
      independent_judgment: true
    domain_payload:
      kind: grammar
      position: task
      field_rules:
        - field: extract
          cardinality: optional
          value_shape:
            registry: grammar
            id: jq_binding_map
        - field: output
          cardinality: forbidden
    diagnostics: ["NIKA-OUT-002"]
    fixtures:
      - to-mint-c1/conformance/outputs/valid/extract-bindings
    negative_fixtures:
      - to-mint-c1/conformance/outputs/invalid/task-output-field-dead
    projections: ["prose:03-dag", "prose:01-envelope", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:values_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:dag-suite
    introduced_in: C0
    proof_obligations:
      - "R4 verbatim : « le champ graph-node se renomme dans le même format bump ». Le format machine graph porte le rename dans le MEME bump de version de format, jamais deux formats vivants pour le meme champ."
      - "R8 point 15 verbatim : « Codemod equivalence-or-stop. » Le rename output:->extract: est cle-a-cle mecanique; census old-form = 0 avant fermeture (R8 point 18)."
    closure_gates:
      - old-form-output-census-zero
      - graph-node-field-renamed-same-bump
      - codemod-equivalence-or-stop

