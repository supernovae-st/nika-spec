  # ───────────────── R4 · les arbres disjoints (out.<n> hors record) ─────────

  - id: LAW-SURFACE-0221
    slug: outputs/bindings-out-tree-disjoint-from-record
    status: reserved
    owner: spec
    domain: SURFACE
    title: "Les bindings extraits vivent sous tasks.X.out.<name>, un arbre disjoint du record moteur"
    prose_projection:
      chapters: ["04-variables", "03-dag"]
      text: "R4 verbatim : « **Choix : (b) `tasks.X.out.<n>` + `extract:`.** » · R4 verbatim : « Les bindings jq sortent du namespace record → `tasks.X.out.<name>` (arbres disjoints · le record grandit additivement à jamais · la liste réservée PARSE-013 et son treadmill meurent). » · R4 verbatim : « Ferme le hard-reject vivant (engine 7 noms vs spec 6 · `.cause` divergence). » Les noms de champs moteur du record et les noms de bindings d'auteur vivent dans deux arbres disjoints; l'espace out.<name> appartient entierement a l'auteur, aucune liste reservee ne le contraint plus."
    inputs:
      - registry: surface
        id: task_record_engine_field_names
        role: required
      - registry: surface
        id: task_out_binding_names
        role: required
    premises:
      - operator: intersect_empty
        operands:
          - registry: surface
            id: task_record_engine_field_names
          - registry: surface
            id: task_out_binding_names
        quantifier: forall
    conclusion:
      verdict: admit
      diagnostics_on_refuse: ["NIKA-OUT-001"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: surface
          id: task_out_namespace
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: family_membership
      subject:
        registry: surface
        id: task_out_namespace
    diagnostics: ["NIKA-OUT-001"]
    fixtures:
      - to-mint-c1/conformance/outputs/valid/out-names-free-of-reserved-list
    negative_fixtures:
      - to-mint-c1/conformance/outputs/invalid/record-tree-collision
    projections: ["prose:04-variables", "prose:03-dag", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:values_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:variables-suite
    introduced_in: C0
    proof_obligations:
      - "R4 verbatim : « la liste réservée PARSE-013 et son treadmill meurent ». PARSE-013 (spec/05-errors.md:90 · la liste des 6 noms reserves) devient tombstone; un nom de binding jadis reserve (output · status · error · started_at · ended_at · duration_ms) est legal sous out.<name>."
      - "R4 verbatim : « Ferme le hard-reject vivant (engine 7 noms vs spec 6 · `.cause` divergence). » La divergence engine-vs-spec sur .cause devient sans objet : les noms record ne contraignent plus jamais les bindings d'auteur, aucune des deux listes ne survit."
      - "R8 point 11 verbatim : « Concernant outputs : distinguer strictement tasks.X.output, tasks.X.out.<name>, extract:, outputs: du workflow ». Quatre objets, quatre arbres/roles distincts, zero collision structurelle."
    closure_gates:
      - parse-013-tombstoned
      - reserved-name-treadmill-dead
      - seven-vs-six-hard-reject-closed

  - id: LAW-SURFACE-0222
    slug: outputs/record-grows-additively-forever
    status: reserved
    owner: spec
    domain: SURFACE
    title: "Le record moteur grandit additivement a jamais"
    prose_projection:
      chapters: ["04-variables", "03-dag"]
      text: "R4 verbatim : « Les bindings jq sortent du namespace record → `tasks.X.out.<name>` (arbres disjoints · le record grandit additivement à jamais · la liste réservée PARSE-013 et son treadmill meurent). » Branche additivite : le record (les champs moteur sous tasks.X) est reserve au moteur et n'evolue que par ajout; un champ record publie ne disparait jamais et n'est jamais renomme, et un ajout ne peut plus jamais casser un binding d'auteur (les arbres sont disjoints)."
    inputs:
      - registry: surface
        id: task_record_fields_released
        role: required
      - registry: surface
        id: task_record_fields_current
        role: required
    premises:
      - operator: subset_of
        operands:
          - registry: surface
            id: task_record_fields_released
          - registry: surface
            id: task_record_fields_current
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: surface
          id: task_record_namespace
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: reservation
      subject:
        registry: surface
        id: task_record_namespace
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/outputs/registry/record-additive-evolution
    projections: ["prose:04-variables", "schema", "cli:check", "docs"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:values_core.py
      - conformance:variables-suite
    introduced_in: C0
    proof_obligations:
      - "Le treadmill mort est la preuve structurelle : avant R4, chaque nouveau champ record ajoutait un nom reserve qui cassait des workflows existants (le treadmill PARSE-013); avec les arbres disjoints, l'ajout d'un champ record est invisible pour l'auteur, a jamais."
    closure_gates:
      - record-additive-forever

  # ───────────────── R4 · extract: remplace le misnomer output: ──────────────

