  # ───────────────── F3 · le type du contrat se dérive par défaut ────────────

  - id: LAW-TYPE-0221
    slug: outputs/contract-type-derived-by-default
    status: reserved
    owner: spec
    domain: TYPE
    title: "Le type du contrat output se derive de l'expression value via le Type Core par defaut"
    prose_projection:
      chapters: ["01-envelope", "09-types"]
      text: "ANNEX row F3 verbatim : « **KEEP-HARDENED · `value:` + type dérivé-par-défaut** » avec Migration = « `outputs-type-derive-v1` (equivalence-or-stop · dépend R3b) ». Receipt json (candidates reinforced-value-derived · notes, ligne 49) verbatim : « value: kept · type: DERIVED-BY-DEFAULT from the Type Core (composes the R3b TypeExpr leg) » et « non-derivable -> type: REQUIRED (the sole truth, e.g. the callable/MCP O-half at an untyped frontier). » R8 point 11 verbatim : « éviter toute redéclaration manuelle de type lorsqu'il peut être dérivé du Type Core ; aucune deuxième vérité entre expression source et contrat exporté. » Le contrat exporte porte le type derive de l'expression value; a une frontiere non derivable, le type ecrit est REQUIRED et devient la seule verite."
    inputs:
      - registry: ir
        id: output_value_expression
        role: required
      - registry: ir
        id: output_contract_type
        role: derived
    premises:
      - operator: derived_from
        operands:
          - registry: ir
            id: output_contract_type
          - registry: ir
            id: output_value_expression
        quantifier: forall
    conclusion:
      verdict: derive
      derives:
        registry: ir
        id: output_contract_type
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: output_contract_type
      independent_judgment: true
    domain_payload:
      kind: type
      relation: normalizes_to
      operands:
        - registry: ir
          id: output_value_expression
        - registry: ir
          id: output_contract_type
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/outputs/valid/contract-type-derived
      - to-mint-c1/conformance/outputs/valid/non-derivable-written-type-required
    projections: ["prose:01-envelope", "prose:09-types", "schema", "cli:check", "cli:inspect", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:type_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:variables-suite
    introduced_in: C0
    proof_obligations:
      - "Receipt §Migration row verbatim : « derive D from the `value:` expression via the Type Core; `type:` ≡ D → DROP (equivalence proven, receipt records derived=declared); `type:` ≠ D → STOP dual-truth finding (negative witness `conformance/variables/typed-outputs-mismatch.nika.yaml`); non-derivable → `type:` stays REQUIRED. » Le codemod outputs-type-derive-v1 est equivalence-or-stop et depend du leg R3b (sequence apres lui dans LA cascade atomique unique, R8 point 14)."
      - "La derivation est deterministe : meme expression value + meme Type Core = meme type de contrat, sur toutes les surfaces (checker · reference · MCP)."
    closure_gates:
      - non-derivable-requires-written-type
      - no-second-truth-source-vs-contract

  - id: LAW-TYPE-0222
    slug: outputs/written-type-equal-derived-warns-diverge-errors
    status: reserved
    owner: spec
    domain: TYPE
    title: "Un type ecrit egal au derive est un WARN de redondance, un type ecrit divergent est une ERROR"
    prose_projection:
      chapters: ["01-envelope", "09-types"]
      text: "Receipt f3-outputs-form-receipt.json (candidates reinforced-value-derived · notes, ligne 49) verbatim : « written type == derived -> WARN redundant; written type != derived -> ERROR (existing negative witness conformance/variables/typed-outputs-mismatch.nika.yaml) ». Receipt md §Migration row verbatim : « `type:` ≠ D → STOP dual-truth finding ». R8 point 11 verbatim : « aucune deuxième vérité entre expression source et contrat exporté. » Quand un type est ecrit ET derivable : l'egalite au derive vaut WARN (redeclaration a eviter, R8 point 11 « éviter »), la divergence vaut ERROR (une deuxieme verite, refusee au check)."
    inputs:
      - registry: ir
        id: output_written_type
        role: required
      - registry: ir
        id: output_derived_type
        role: required
    premises:
      - operator: equals
        operands:
          - registry: ir
            id: output_written_type
          - registry: ir
            id: output_derived_type
        quantifier: forall
    conclusion:
      verdict: warn
      diagnostics_on_refuse: ["NIKA-OUT-004"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: ir
          id: output_contract_type
      independent_judgment: true
    domain_payload:
      kind: type
      relation: normalizes_to
      operands:
        - registry: ir
          id: output_written_type
        - registry: ir
          id: output_derived_type
    diagnostics: ["NIKA-OUT-005", "NIKA-OUT-004"]
    fixtures:
      - to-mint-c1/conformance/outputs/warn/written-type-equals-derived
    negative_fixtures:
      - conformance/variables/typed-outputs-mismatch.nika.yaml
    projections: ["prose:01-envelope", "prose:09-types", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:type_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:variables-suite
    introduced_in: C0
    proof_obligations:
      - "Le negative witness EXISTE deja au pin : conformance/variables/typed-outputs-mismatch.nika.yaml (cite verbatim par le receipt F3) refuse sur la divergence ecrit/derive; la branche WARN recoit sa fixture a C1."
      - "NIKA-OUT-005 (WARN redondance) et NIKA-OUT-004 (ERROR dual-truth) sont deux codes distincts : jamais un meme code pour deux severites (SSOT-2 B.16 un code = une condition normative exacte)."
    closure_gates:
