    slug: yaml/anchor-forbidden
    status: reserved
    owner: spec
    domain: GRAMMAR
    title: "Un anchor YAML est refusé par le profil Nika, même s'il n'est jamais référencé"
    prose_projection:
      chapters: ["11-yaml-profile"]
      text: "R11 point 1 verbatim : « Le profil YAML Nika interdit : anchors ; aliases ; merge keys `<<`. » · R11 point 3 verbatim : « Un anchor est refusé même s'il n'est jamais référencé. » Cette loi porte la branche anchor. La présence seule de l'event anchor refuse la source, avec le diagnostic dédié NIKA-YAML-001."
    inputs:
      - registry: ir
        id: yaml_source_events
        role: required
    premises:
      - operator: present
        operands:
          - registry: ir
            id: yaml_anchor_event
        quantifier: exists
    conclusion:
      verdict: refuse
      diagnostics_on_refuse: ["NIKA-YAML-001"]
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: yaml_forbidden_event_classes
      independent_judgment: true
    domain_payload:
      kind: grammar
      position: yaml_source_document
      field_rules:
        - field: anchor
          cardinality: forbidden
    diagnostics: ["NIKA-YAML-001"]
    fixtures:
      - conformance/yaml-profile/valid/clean-minimal.nika.yaml
    negative_fixtures:
      - research/pre1-gate/probes/anchors.nika.yaml
      - conformance/yaml-profile/invalid/anchor-unreferenced.nika.yaml
    projections: ["prose:11-yaml-profile", "schema", "cli:check", "lsp", "mcp", "sdk"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:yaml_profile_core.py
      - cli:nika-check
      - lsp:nika-lsp
      - mcp:nika-mcp
      - conformance:yaml-profile-suite
    introduced_in: C0
    proof_obligations:
      - "R11 point 3 verbatim : « Un anchor est refusé même s'il n'est jamais référencé. » La fixture anchor-unused refuse sans aucune référence alias."
      - "R11 point 6 verbatim : « Aucun moteur ne peut choisir de développer les anchors silencieusement. » Aucun chemin d'expansion n'existe, le verdict est refuse."
      - "R11 point 7 verbatim : « Aucun mode permissif, aucun warning-only et aucun backend-specific behavior. » La classe de verdict est refuse dans tous les modes."
      - "R11 point 2 verbatim : « Cette interdiction est normative dans la spec et appliquée par l'engine. » Surfaces engine + reference déclarées ci-dessus."
    closure_gates:
      - fixture-parity
      - current-facing-anchor-census-zero

