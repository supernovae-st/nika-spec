  # ───────────────── R3a + R8 points 15-17 · une autorité, une orthographe ───

  - id: LAW-SURFACE-0202
    slug: values/one-authority-one-spelling-no-alias
    status: active
    owner: spec
    domain: SURFACE
    title: "Une valeur a exactement une autorite et une orthographe, aucun alias, aucune deuxieme syntaxe"
    prose_projection:
      chapters: ["04-variables", "01-envelope"]
      text: "R8 points 15-17 verbatim : « 15. Codemod equivalence-or-stop. 16. Aucun alias. 17. Aucune deuxième syntaxe. » · R3a verbatim : « Codemod classify-not-rename (equivalence-or-stop). » La classification est le SEUL pont entre les formes mortes (vars/env) et la famille 4-autorites; aucun alias de compatibilite ne survit a la cascade, aucune deuxieme orthographe d'autorite n'existe."
    inputs:
      - registry: surface
        id: value_authority_aliases
        role: required
    premises:
      - operator: absent
        operands:
          - registry: surface
            id: value_authority_aliases
        quantifier: forall
    conclusion:
      verdict: admit
    canonicalization:
      order_sensitive: false
      normalization: ["none"]
    judgment:
      generated_facts:
        - registry: grammar
          id: value_authority_family
      independent_judgment: true
    domain_payload:
      kind: surface
      constraint: one_spelling_per_meaning
      subject:
        registry: surface
        id: value_authority_family
    diagnostics: []
    fixtures:
      - to-mint-c1/conformance/values/registry/no-authority-aliases
    projections: ["prose:04-variables", "schema", "cli:check", "docs"]
    implementation_surfaces:
      - engine:nika-schema
      - reference:values_core.py
      - conformance:values-suite
    introduced_in: C0
    proof_obligations:
      - "R8 point 16 verbatim : « Aucun alias. » Le registre surface ne contient aucune row alias pour les quatre autorites, ni pour les formes mortes vars/env."
      - "R8 point 17 verbatim : « Aucune deuxième syntaxe. » Le global invariant du gate le reaffirme : « no alias · no second syntax · no second truth »."
    closure_gates:
      - no-alias-zero
      - no-second-syntax
