# Expected: check-reject (gate verdict). SECRETS: one sanctioned sink + one unsanctioned — the unsanctioned one refuses.
# One egress-sanctioned sink is fine; the parallel exec sink leaks.
nika: v1
workflow:
  id: sec34-secret-two-sinks-one-sanctioned
  description: "IFC: secret with egress to fetch but ALSO used in exec (partial sanction) — exec leg should fail IFC"

secrets:
  webhook_url:
    source: env
    key: FAKE_WEBHOOK_FOR_TEST
    egress:
      - to: nika:fetch
        host_from_self: true

permits:
  net:
    http: ["*"]
  exec: true
  tools: ["nika:fetch"]

tasks:
  sanctioned_send:
    invoke:
      tool: nika:fetch
      args:
        url: ${{ secrets.webhook_url }}

  unsanctioned_exec:
    depends_on: [sanctioned_send]
    exec:
      command: ["echo", "${{ secrets.webhook_url }}"]
