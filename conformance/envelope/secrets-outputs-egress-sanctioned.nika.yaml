# Expected: exit 0 — the SAME taint path as secrets-leak-outputs-boundary, with the {to: outputs} sanction declared; check passes.
# The boundary pair: the refusal fixture proves the wall, this twin proves the
# refusal is precise (a declared declassification opens exactly that door).
nika: v1
workflow:
  id: sec20-secret-outputs-egress-sanctioned
  description: "SANCTIONED: secret-derived value exported via outputs: with egress {to: outputs} — check PASSES"

secrets:
  api_key:
    source: env
    key: FAKE_API_KEY_FOR_TEST
    egress:
      - { to: "nika:jq" }
      - { to: "outputs" }

tasks:
  derive:
    with: { k: "${{ secrets.api_key }}" }
    invoke:
      tool: "nika:jq"
      args: { input: "${{ with.k }}", expression: "." }

outputs:
  exported: "${{ tasks.derive.output }}"
