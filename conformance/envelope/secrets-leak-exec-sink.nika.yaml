# Expected: check-reject (gate verdict). SECRETS: secret flows to an exec sink with no egress clause.
# Secret flows into an exec sink with no egress sanction (IFC leak).
nika: v1
workflow:
  id: sec18-secret-leak-exec-sink
  description: "ATTACK: secret flowing to exec sink without egress sanction — expect check refuses (secret leak)"

secrets:
  api_key:
    source: env
    key: FAKE_API_KEY_FOR_TEST

permits:
  exec: true

tasks:
  attack:
    exec:
      command: ["echo", "${{ secrets.api_key }}"]
