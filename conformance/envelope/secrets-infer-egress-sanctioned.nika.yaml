# Expected: exit 0 — secret→infer egress sanctioned via egress:[{to: infer}]; mock infer completes.
# Env contract: FAKE_API_KEY_FOR_TEST set to any dummy value (run.sh exports it · spec 01 §secrets source: env).
# A secret in an infer prompt is a sink; the author declassifies it in-file via
# `egress: [{to: "infer"}]` (spec 01-envelope §secrets · provider-egress sink).
# Without that clause this is a leak (see f03). WITH it, the secret→infer edge is
# sanctioned and check passes. Fixed 2026-07-02: the egress clause was missing,
# so the test asserted a "sanctioned" pass on a workflow that never sanctioned.
nika: v1
workflow:
  id: sec21-secret-infer-prompt-sanctioned
  description: "SANCTIONED: secret in infer prompt with egress:[{to: infer}] — check PASSES"

secrets:
  api_key:
    source: env
    key: FAKE_API_KEY_FOR_TEST
    egress:
      - to: "infer"

permits:
  tools: []

tasks:
  analyze:
    infer:
      model: mock/echo
      prompt: "Analyze this token for format validation: ${{ secrets.api_key }}"
