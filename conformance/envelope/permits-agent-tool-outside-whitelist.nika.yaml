# Expected: check-reject (gate verdict). PERMITS: agent tool outside the tools: whitelist.
nika: v1
workflow: sec15-agent-tool-outside-whitelist
description: "ATTACK: agent task with tool not in tools whitelist — expect NIKA-SEC-002"

permits:
  tools: ["nika:fetch"]

tasks:
  - id: attack
    agent:
      model: mock/echo
      prompt: "list all files in the system"
      tools: ["nika:read", "nika:write"]
