# Expected: NIKA-SEC-001 at RUN.
# The argv-form identity floor (spec §163 + check_argv). While the string
# blocklist is string-form only (see sec36), the ARRAY form still enforces
# PROGRAM IDENTITY: DANGEROUS_PROGRAMS (sudo/doas/pkexec/su/runas · shutdown/
# reboot/halt/poweroff · env/xargs) are refused at the exec floor even in argv
# form. `["sudo","rm","-rf",…]` is blocked on the `sudo` identity, proving the
# argv form is NOT a blanket bypass — it's a DIFFERENT, structural gate.
# Empirically confirmed 2026-07-02 (program "sudo" blocked at the exec floor).
nika: v1
workflow: sec36b-exec-array-identity-floor
description: "argv-form sudo IS blocked (program-identity floor · spec §163 · NIKA-SEC-001)"

permits:
  exec: true

tasks:
  - id: sudo_argv_blocked
    exec:
      command: ["sudo", "rm", "-rf", "/tmp/x"]
