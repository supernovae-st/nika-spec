# Expected: check-reject (gate verdict). SECRETS: concat-laundered secret still reaches a sink.
# Secret laundered through jq concat then exec (tainted-output leak).
nika: v1
workflow: sec20-secret-launder-concat
description: "ATTACK: secret laundering via jq concat then exec — check should refuse (tainted output to exec)"

secrets:
  api_key:
    source: env
    key: FAKE_API_KEY_FOR_TEST

permits:
  exec: true
  tools: ["nika:jq"]

tasks:
  - id: launder
    invoke:
      tool: nika:jq
      args:
        input: "prefix_"
        expression: ". + \"${{ secrets.api_key }}\""

  - id: attack_exec
    depends_on: [launder]
    exec:
      command: ["echo", "${{ tasks.launder.output }}"]
