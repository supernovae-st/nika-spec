# Expected: check-reject (gate verdict). SECRETS: secret in an infer prompt with no egress clause.
# A secret in an infer PROMPT is a sink (spec 01-envelope §secrets: the carve-out
# is the infer/agent OUTPUT, never the prompt). Default-deny with no `egress:`
# declared → the secrets.token → infer edge is a leak, rejected at check.
# The sanctioned counterpart (with `egress: [{to: infer}]`) is sec21.
nika: v1
workflow: f03-infer-secret
secrets:
  token:
    source: env
    key: SOME_TOKEN
model: mock/echo
tasks:
  - id: ask
    infer:
      prompt: "Summarize the topic. Context token ${{ secrets.token }}"
