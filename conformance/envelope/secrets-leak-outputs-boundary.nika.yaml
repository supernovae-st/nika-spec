# Expected: check-reject (gate verdict). SECRETS: a secret-tainted value reaches the workflow boundary (outputs:) with no {to: outputs} sanction — NIKA-SEC-007 class (spec 10 · 01 §egress).
# The invoke sink is sanctioned (egress to nika:jq) so the ONE finding is the
# outputs boundary — the class no fixture covered before 2026-07-20.
nika: v1
workflow:
  id: sec19-secret-leak-outputs-boundary
  description: "ATTACK: secret-tainted value exported via outputs: without egress sanction — expect check refuses"

secrets:
  api_key:
    source: env
    key: FAKE_API_KEY_FOR_TEST
    egress:
      - { to: "nika:jq" }

tasks:
  derive:
    with: { k: "${{ secrets.api_key }}" }
    invoke:
      tool: "nika:jq"
      args: { input: "${{ with.k }}", expression: "." }

outputs:
  leaked: "${{ tasks.derive.output }}"
