# Expected: NIKA-BUILTIN-WRITE-001 at RUN.
# W24: check-vs-runtime gap probe
# Tests: does nika check catch a static error that only bites at runtime?
# This workflow uses an invalid jq expression that the parser might not catch statically.
# Detail: jq on a missing key legally yields null (no jq error); the failure surfaces downstream when nika:write rejects null content (NIKA-BUILTIN-WRITE-001). check passes — the gap is real, the code is WRITE-001.
nika: v1
workflow:
  id: w24-check-vs-runtime-gap

const:
  data:
    value: 42

tasks:
  bad_jq:
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ const.data }}
        expression: ".nonexistent_key | .nested_path"

  write_result:
    with:
      bad_jq: ${{ tasks.bad_jq.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/data-validation/w24-check-vs-runtime-gap.json"
        content: ${{ with.bad_jq }}
        create_dirs: true
