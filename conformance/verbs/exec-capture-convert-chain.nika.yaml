# Expected: exit 0 — exec stdout captured, then nika:convert csv→json.
nika: v1
workflow:
  id: c22-convert-builtin
  description: "Generate CSV-like content, use nika:convert to transform CSV→JSON"

tasks:
  csv_data:
    exec:
      command: ["printf", "'name,role,score\\nAlice,writer,9\\nBob,editor,7\\nCarol,reviewer,8\\n'"]
      capture: stdout

  to_json:
    with:
      csv_data: ${{ tasks.csv_data.output }}
    invoke:
      tool: "nika:convert"
      args:
        input: "${{ with.csv_data }}"
        from: csv
        to: json
        has_header: true

  result:
    with:
      to_json: ${{ tasks.to_json.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/content/c22-result.json"
        content: "${{ with.to_json }}"
        create_dirs: true
