# Expected: NIKA-BUILTIN-ASSERT-001 at RUN.
nika: v1
workflow: e22-builtin-assert-fail
# INTENT: NIKA-BUILTIN-ASSERT-001 — assert condition is false
vars:
  value: 5
tasks:
