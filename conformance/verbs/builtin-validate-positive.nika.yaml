# Expected: exit 0 — nika:validate passes a valid object.
# W01: validate a well-formed object — PASS case
# Tests: nika:validate with required fields + type constraints
nika: v1
workflow:
  id: w01-validate-valid-object

vars:
  doc:
    name: "Alice"
    age: 30

tasks:
  validate_doc:
    invoke:
      tool: "nika:validate"
      args:
        data: ${{ vars.doc }}
        schema:
          type: object
          required: [name, age]
          properties:
            name:
              type: string
            age:
              type: integer
              minimum: 0

  assert_valid:
    with:
      is_valid: ${{ tasks.validate_doc.output.valid }}
    invoke:
      tool: "nika:assert"
      args:
        condition: "${{ with.is_valid == true }}"
        message: "Expected valid:true but got false"

  write_result:
    with:
      report: ${{ tasks.validate_doc.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/data-validation/w01-validate-valid-object.json"
        content: ${{ with.report }}
        create_dirs: true
