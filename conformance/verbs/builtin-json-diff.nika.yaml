# Expected: exit 0 — nika:diff over inline documents.
nika: v1
workflow:
  id: competitor-json-diff
  description: "Use nika:json_diff to detect changes in competitor feature set"

model: mock/echo

tasks:
  previous_snapshot:
    invoke:
      tool: "nika:jq"
      args:
        input:
          features: ["auth", "api", "dashboard", "export"]
          pricing_tiers: 3
          last_updated: "2026-01-01"
        expression: "."

  current_snapshot:
    invoke:
      tool: "nika:jq"
      args:
        input:
          features: ["auth", "api", "dashboard", "export", "ai-assistant"]
          pricing_tiers: 4
          last_updated: "2026-06-15"
        expression: "."

  diff:
    with:
      previous_snapshot: ${{ tasks.previous_snapshot.output }}
      current_snapshot: ${{ tasks.current_snapshot.output }}
    invoke:
      tool: "nika:json_diff"
      args:
        before: "${{ with.previous_snapshot }}"
        after: "${{ with.current_snapshot }}"

  analyze_diff:
    with:
      diff: ${{ tasks.diff.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: "${{ with.diff }}"
        expression: "{ change_count: length, operations: [.[].op] | unique, has_additions: (map(select(.op == \"add\")) | length > 0) }"

  save:
    with:
      analyze_diff: ${{ tasks.analyze_diff.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/competitor/16-json-diff.json"
        content: "${{ with.analyze_diff }}"
        create_dirs: true

outputs:
  diff_report: ${{ tasks.analyze_diff.output }}
