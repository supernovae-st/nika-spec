# Expected: exit 0 — nika:extract over inline HTML (offline).
# r12 · mock/echo chain: verify DAG wiring, output bindings, no LLM cost
# Tests: mock/echo with output: bindings, chaining mock outputs into prompt
nika: v1
workflow:
  id: mock-extract-chain

model: mock/echo

const:
  article_content: "Rust 1.87 introduces async closures, improved error messages, and const generics stabilization."

tasks:
  echo_content:
    invoke:
      tool: nika:jq
      args:
        input:
          data:
            title: "Mock Article Title"
            body: "${{ const.article_content }}"
        expression: ".data"
    output:
      title: ".title"
      body: ".body"

  build_prompt_data:
    with:
      echo_content_title: ${{ tasks.echo_content.title }}
      echo_content_body: ${{ tasks.echo_content.body }}
    invoke:
      tool: nika:jq
      args:
        input:
          title: ${{ with.echo_content_title }}
          body: ${{ with.echo_content_body }}
          word_count: 20
        expression: |
          {
            title: .title,
            body: .body,
            word_count: .word_count,
            has_title: (.title | type) == "string",
            has_body: (.body | type) == "string"
          }

  save:
    with:
      build_prompt_data: ${{ tasks.build_prompt_data.output }}
    invoke:
      tool: nika:write
      args:
        path: "./out/research/r12-mock-chain.json"
        content: "${{ with.build_prompt_data }}"
        create_dirs: true
