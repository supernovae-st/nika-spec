# Expected: NIKA-BUILTIN-VALIDATE-001 at RUN. The schema itself is malformed; check cannot know statically.
# W37: nika:validate — NIKA-BUILTIN-VALIDATE-001: invalid JSON Schema
# The schema itself is malformed (unknown type value)
# Tests: NIKA-BUILTIN-VALIDATE-001 fires at runtime
# nika check: might pass (schema validity is hard to check statically)
# nika run: should fail with NIKA-BUILTIN-VALIDATE-001
nika: v1
workflow:
  id: w37-validate-bad-schema

const:
  doc:
    name: "Alice"

tasks:
  validate_bad_schema:
    invoke:
      tool: "nika:validate"
      args:
        data: ${{ const.doc }}
        schema:
          type: not_a_real_json_schema_type

  write_result:
    with:
      validate_bad_schema: ${{ tasks.validate_bad_schema.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/data-validation/w37-validate-bad-schema.json"
        content: ${{ with.validate_bad_schema }}
        create_dirs: true
