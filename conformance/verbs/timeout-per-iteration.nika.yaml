# Expected: NIKA-TIMEOUT-001 at RUN. Slow iterations exceed the per-iteration timeout.
nika: v1
workflow:
  id: e37-foreach-timeout-per-iter
# INTENT: for_each with timeout per iteration — slow iterations time out
permits:
  exec: ["sleep"]
const:
  items:
    - "one"
    - "two"
    - "three"
tasks:
  slow_iter:
    for_each: ${{ const.items }}
    timeout: "1s"
    fail_fast: false
    exec:
      command: ["sleep", "3"]
