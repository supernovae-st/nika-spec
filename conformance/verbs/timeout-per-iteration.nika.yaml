# Expected: NIKA-TIMEOUT-001 at RUN. Slow iterations exceed the per-iteration timeout.
nika: v1
workflow: e37-foreach-timeout-per-iter
# INTENT: for_each with timeout per iteration — slow iterations time out
permits:
  exec: ["sleep"]
vars:
  items:
    - "one"
    - "two"
    - "three"
tasks:
  - id: slow_iter
    for_each: ${{ vars.items }}
    timeout: "1s"
    fail_fast: false
    exec:
      command: ["sleep", "3"]
