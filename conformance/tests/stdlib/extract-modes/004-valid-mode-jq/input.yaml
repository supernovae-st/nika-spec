# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: api-extract
permits:
  tools: ["nika:fetch"]
  net: { http: ["api.example.com"] }
tasks:
  get:
    invoke:
      tool: "nika:fetch"
      args:
        url: "https://api.example.com/data"
        mode: jq
        jq: ".items | map(.name)"
