nika: v1
workflow: image-edit-valid
permits:
  fs:
    read: ["./assets/**"]
    write: ["./out/**"]
  tools: ["nika:image_generate"]
tasks:
  - id: edit
    invoke:
      tool: "nika:image_generate"
      args:
        provider: openai
        mode: edit
        image: "./assets/hero.png"
        prompt: "make the sky a sunset"
        output_dir: "./out"
