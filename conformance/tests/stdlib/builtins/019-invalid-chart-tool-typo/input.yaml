# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: chart-tool-typo
permits:
  fs:
    read: ["./out/**"]
    write: ["./report/**"]
  tools: ["nika:charts"]
tasks:
  render:
    invoke:
      tool: "nika:charts"
      args:
        data: { path: "./out/metrics.json" }
        out: report/chart.svg
