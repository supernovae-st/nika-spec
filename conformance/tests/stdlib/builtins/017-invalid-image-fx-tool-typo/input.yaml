# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: image-fx-tool-typo
permits:
  fs:
    read: ["./out/**"]
    write: ["./out/**"]
  tools: ["nika:imagefx"]
tasks:
  style:
    invoke:
      tool: "nika:imagefx"
      args:
        input: "./out/hero.png"
        out: "./out/hero-styled.png"
        ops:
          - grayscale: {}
