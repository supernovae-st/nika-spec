# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: og-hero-sovereign
permits:
  tools: ["nika:image_generate"]
tasks:
  hero:
    invoke:
      tool: "nika:image_generate"
      args:
        provider: local
        model: "x/z-image-turbo"
        prompt: "OG hero — a monarch butterfly over a nebula"
        aspect_ratio: "16:9"
        output_dir: "./assets/og"
