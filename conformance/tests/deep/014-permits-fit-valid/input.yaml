nika: v1
workflow:
  id: deep-014
permits:
  fs: { read: ["./data/**"], write: ["./out/**"] }
  exec: ["git"]
  tools: ["nika:read", "nika:write"]
tasks:
  log_head:
    exec:
      command: ["git", "log", "--oneline", "-1"]
  snapshot:
    with:
      log_head: ${{ tasks.log_head.output }}
    invoke:
      tool: "nika:write"
      args: { path: "./out/head.txt", content: "${{ with.log_head }}" }
