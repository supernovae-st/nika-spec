# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: research-pipeline
model: mock/echo
vars:
  topic:
    type: string
    required: true
tasks:
  research:
    infer:
      prompt: "Research ${{ vars.topic }}"
  summarize:
    depends_on: [research]
    infer:
      prompt: "Summarize ${{ tasks.research.output }}"
outputs:
  brief:
    value: ${{ tasks.summarize.output }}
    type: string
