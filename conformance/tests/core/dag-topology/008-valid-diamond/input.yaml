# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: diamond
tasks:
  a:
    exec: { command: ["./prepare.sh"] }
  b:
    depends_on: [a]
    infer: { prompt: "Analyze branch B" }
  c:
    depends_on: [a]
    infer: { prompt: "Analyze branch C" }
  d:
    depends_on: [b, c]
    infer: { prompt: "Merge" }
