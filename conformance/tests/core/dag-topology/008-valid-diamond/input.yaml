# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: diamond
tasks:
  a:
    exec: { command: ["./prepare.sh"] }
  b:
    after: { a: success }
    infer: { prompt: "Analyze branch B" }
  c:
    after: { a: success }
    infer: { prompt: "Analyze branch C" }
  d:
    with:
      b: ${{ tasks.b.output }}
      c: ${{ tasks.c.output }}
    infer: { prompt: "Merge · ${{ with.b }} · ${{ with.c }}" }
