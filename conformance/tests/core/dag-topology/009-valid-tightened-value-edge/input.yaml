# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: chain
tasks:
  fetch:
    invoke:
      tool: nika:fetch
      args: { url: "https://example.com", mode: article }
  summarize:
    after: { fetch: success }
    with:
      content: ${{ tasks.fetch.output }}
    infer:
      prompt: "Summarize · ${{ with.content }}"
