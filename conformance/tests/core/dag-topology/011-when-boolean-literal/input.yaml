# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: core-when-true
permits:
  tools: ["nika:notify"]
  exec: ["./build.sh"]
tasks:
  build:
    exec: { command: ["./build.sh"] }
  notify:
    after: { build: terminal }
    when: true
    invoke: { tool: "nika:notify", args: { message: "done either way" } }
