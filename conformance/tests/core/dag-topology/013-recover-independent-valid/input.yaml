nika: v1
workflow:
  id: dag-recover-independent
tasks:
  cached:
    invoke: { tool: "nika:read", args: { path: "./fixtures/cached.json" } }
  fetch:
    invoke: { tool: "nika:fetch", args: { url: "https://api.example.com" } }
    on_error:
      recover: ${{ tasks.cached.output }}
