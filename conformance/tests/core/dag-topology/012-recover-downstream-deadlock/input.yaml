nika: v1
workflow:
  id: dag-recover-deadlock
tasks:
  fetch:
    invoke: { tool: "nika:fetch", args: { url: "https://api.example.com" } }
    on_error:
      recover: ${{ tasks.fallback.output }}
  fallback:
    after: { fetch: success }
    infer: { prompt: "depends on the task it would rescue" }
