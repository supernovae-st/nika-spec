nika: v1
workflow:
  id: translate
vars:
  source: "Hello world"
tasks:
  translate:
    for_each: ["fr", "de", "ja"]
    with:
      locale: ${{ item }}
      n: ${{ index }}
    infer:
      prompt: "Translate to locale '${{ with.locale }}' (#${{ with.n }}) · ${{ vars.source }}"
