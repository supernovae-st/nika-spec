# SPDX-License-Identifier: Apache-2.0
# Static binding validation soundness · OPEN levels are never rejected ·
# (a) `meta` has no additionalProperties:false → unknown keys below stay
# legal · (b) a schema-less producer (exec) is fully dynamic · (c) a
# declared property path is of course valid. The engine MUST accept.
nika: v1
workflow:
  id: schema-path-open
tasks:
  extract:
    infer:
      prompt: "Extract entities"
      schema:
        type: object
        required: [entities]
        properties:
          entities:
            type: array
            items: { type: string }
          meta:
            type: object
  fetch_raw:
    exec: { command: ["./dump.sh"] }
  report:
    depends_on: [extract, fetch_raw]
    exec:
      command: ["report", "${{ tasks.extract.output.entities }}", "${{ tasks.extract.output.meta.anything }}", "${{ tasks.extract.output.maybe_extra }}", "${{ tasks.fetch_raw.output.whatever }}"]
