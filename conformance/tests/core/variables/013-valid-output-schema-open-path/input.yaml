# SPDX-License-Identifier: Apache-2.0
# Static binding validation soundness · OPEN levels are never rejected ·
# (a) `meta` has no additionalProperties:false → unknown keys below stay
# legal · (b) a schema-less producer (exec) is fully dynamic · (c) a
# declared property path is of course valid. The engine MUST accept.
nika: v1
workflow:
  id: schema-path-open
permits:
  exec: ["./dump.sh", "report"]
tasks:
  extract:
    infer:
      prompt: "Extract entities"
      schema:
        type: object
        required: [entities]
        properties:
          entities:
            type: array
            items: { type: string }
          meta:
            type: object
  fetch_raw:
    exec: { command: ["./dump.sh"] }
  report:
    with:
      extract_entities: ${{ tasks.extract.output.entities }}
      extract_meta_anything: ${{ tasks.extract.output.meta.anything }}
      extract_maybe_extra: ${{ tasks.extract.output.maybe_extra }}
      fetch_raw_whatever: ${{ tasks.fetch_raw.output.whatever }}
    exec:
      command: ["report", "${{ with.extract_entities }}", "${{ with.extract_meta_anything }}", "${{ with.extract_maybe_extra }}", "${{ with.fetch_raw_whatever }}"]
