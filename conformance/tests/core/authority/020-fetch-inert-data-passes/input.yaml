# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: t-fetch-inert-data
permits:
  net: { http: ["data.example.com"] }
  tools: ["nika:fetch"]
tasks:
  rows:
    invoke:
      tool: nika:fetch
      args: { url: "https://data.example.com/q3/rows.csv" }
  feed:
    invoke:
      tool: nika:fetch
      args: { url: "https://data.example.com/feed.json" }
