nika: v1
workflow:
  id: t-inert-door-declared
permits:
  net: { http: ["data.example.com"] }
  tools: ["nika:fetch"]
tasks:
  archive:
    invoke:
      tool: nika:fetch
      args: { url: "https://data.example.com/models/legacy.pkl" }
    inert: "archived for provenance · never loaded by any child of this workflow"
