nika: v1
workflow:
  id: core-on-codes
permits:
  tools: ["nika:fetch"]
  net: { http: ["slow.example.com"] }
tasks:
  slow_fetch:
    invoke: { tool: "nika:fetch", args: { url: "https://slow.example.com" } }
    timeout: "30s"
    on_error:
      on_codes: [NIKA-TIMEOUT-001]
      recover: { stale: true }
