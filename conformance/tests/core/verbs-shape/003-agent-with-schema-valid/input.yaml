# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: review
vars:
  pr: { type: string, required: true }
tasks:
  review:
    agent:
      prompt: "Review ${{ vars.pr }}"
      tools: ["nika:read", "nika:done"]
      schema:
        type: object
        required: [findings]
        properties:
          findings: { type: array }
