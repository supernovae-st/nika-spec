nika: v1
workflow:
  id: forder
tasks:
  a:
    exec: { command: ["./a.sh"] }
    on_error: { skip: true }
  b:
    with:
      data: "${{ tasks.a.output }}"
    exec: { command: ["./b.sh", "${{ with.data }}"] }
  shards:
    for_each: [1, 2]
    exec: { command: ["timeout", "5", "./p.sh"] }
