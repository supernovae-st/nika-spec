nika: v1
workflow:
  id: f005join
tasks:
  a:
    exec: { command: ["./a.sh"] }
  b:
    exec: { command: ["./b.sh"] }
  summarize:
    with:
      left: "${{ tasks.a.output }}"
      right: "${{ tasks.b.output }}"
    exec: { command: ["./summarize.sh", "${{ with.left }}", "${{ with.right }}"] }
