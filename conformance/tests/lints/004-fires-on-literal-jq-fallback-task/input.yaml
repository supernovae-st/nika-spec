# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: f004
tasks:
  a:
    invoke:
      tool: "nika:fetch"
      args: { url: "https://example.com/data" }
  fallback:
    depends_on: [a]
    when: "${{ tasks.a.status == 'failure' }}"
    invoke:
      tool: "nika:jq"
      args: { input: { count: 0 }, expression: "." }
