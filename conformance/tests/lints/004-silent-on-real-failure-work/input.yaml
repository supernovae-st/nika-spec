# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow: f004real
tasks:
  - id: a
    invoke:
      tool: "nika:fetch"
      args: { url: "https://primary.example.com" }
  - id: mirror
    depends_on: [a]
    when: "${{ tasks.a.status == 'failure' }}"
    invoke:
      tool: "nika:fetch"
      args: { url: "https://mirror.example.com" }
