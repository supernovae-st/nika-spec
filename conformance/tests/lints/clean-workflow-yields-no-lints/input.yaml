nika: v1
workflow:
  id: fclean
tasks:
  fetch:
    invoke:
      tool: "nika:fetch"
      args: { url: "https://example.com/data" }
    retry: { max_attempts: 3 }
    on_error:
      recover: { items: [] }
  process:
    with:
      fetch_items: ${{ tasks.fetch.output.items }}
    for_each: "${{ with.fetch_items }}"
    max_parallel: 4
    timeout: 60s
    exec: { command: ["./process.sh"] }
