# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow: fclean
tasks:
  - id: fetch
    invoke:
      tool: "nika:fetch"
      args: { url: "https://example.com/data" }
    retry: { max_attempts: 3 }
    on_error:
      recover: { items: [] }
  - id: process
    depends_on: [fetch]
    for_each: "${{ tasks.fetch.output.items }}"
    max_parallel: 4
    timeout: 60s
    exec: { command: ["./process.sh"] }
