# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: f007pipe
tasks:
  fetch:
    exec: { command: ["./fetch.sh"] }
  parse:
    after:
      fetch: succeeded
    exec: { command: ["./parse.sh", "--strict", "input.json"] }
  report:
    after:
      parse: succeeded
    exec: { command: ["./report.sh"] }
