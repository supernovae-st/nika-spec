# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: f007invoke
tasks:
  page1:
    invoke:
      tool: "nika:fetch"
      args: { url: "https://example.com/page/1" }
  page2:
    after:
      page1: succeeded
    invoke:
      tool: "nika:fetch"
      args: { url: "https://example.com/page/2" }
  page3:
    after:
      page2: succeeded
    invoke:
      tool: "nika:fetch"
      args: { url: "https://example.com/page/3" }
