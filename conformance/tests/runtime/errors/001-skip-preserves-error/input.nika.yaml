# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-skip-preserves-error
model: mock/echo
tasks:
  flaky:
    on_error: { skip: true }
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ 1 > 2 }}", message: "designed failure" }
  router:
    with:
      err: ${{ tasks.flaky.error }}
    when: ${{ with.err != null }}
    infer: { prompt: "routed on the preserved error" }
