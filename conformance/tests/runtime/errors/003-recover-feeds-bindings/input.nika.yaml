# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-recover-feeds-bindings
model: mock/echo
const:
  fallback: { data: { title: "cached title" } }
tasks:
  fetchish:
    on_error:
      recover: ${{ const.fallback }}
    output:
      title: ".data.title"
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ 1 > 2 }}", message: "the live call dies" }
  reader:
    with:
      fetchish_title: ${{ tasks.fetchish.title }}
    infer: { prompt: "${{ with.fetchish_title }}" }
