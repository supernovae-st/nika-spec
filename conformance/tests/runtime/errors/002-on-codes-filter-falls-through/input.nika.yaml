# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow: rt-on-codes-fall-through
model: mock/echo
tasks:
  - id: guarded
    on_error:
      on_codes: [NIKA-TIMEOUT-001]
      recover: "stale-ok"
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ 1 > 2 }}", message: "ASSERT failure · not a timeout" }
