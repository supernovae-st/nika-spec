# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-permits-runtime-hit
model: mock/echo
permits:
  net: { http: ["api.example.com"] }
  tools: ["nika:jq", "nika:fetch"]
vars:
  hosts: ["https://forbidden.example.org/data"]
tasks:
  pick:
    invoke:
      tool: "nika:jq"
      args: { input: "${{ vars.hosts }}", expression: ".[0]" }
  fetcher:
    with:
      pick: ${{ tasks.pick.output }}
    invoke:
      tool: "nika:fetch"
      args:
        url: "${{ with.pick }}"
        mode: text
