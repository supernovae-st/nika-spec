# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow: rt-agent-budget-failure
model: mock/echo
tasks:
  - id: loop
    on_error: { skip: true }
    agent:
      prompt: "loop forever"
      tools: ["nika:wait"]
      max_turns: 2
  - id: reader
    depends_on: [loop]
    when: ${{ tasks.loop.error != null }}
    infer: { prompt: "${{ tasks.loop.error.code }}" }
