# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-agent-budget-failure
model: mock/echo
tasks:
  loop:
    on_error: { skip: true }
    agent:
      prompt: "loop forever"
      tools: ["nika:wait"]
      max_turns: 2
  reader:
    with:
      err: ${{ tasks.loop.error }}
    when: ${{ with.err != null }}
    infer: { prompt: "${{ with.err.code }}" }
