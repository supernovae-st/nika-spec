# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-always-pattern
model: mock/echo
tasks:
  work:
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ 1 > 2 }}", message: "designed failure" }
  dependent:
    depends_on: [work]
    infer: { prompt: "never runs" }
  record:
    depends_on: [work]
    when: true
    infer: { prompt: "the record lands" }
