# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-foreach-null-placeholder
model: mock/echo
vars:
  items: ["alpha", "BOOM", "gamma"]
tasks:
  work:
    for_each: ${{ vars.items }}
    fail_fast: false
    on_error:
      recover: null
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ item != 'BOOM' }}", message: "designed per-item failure" }
  survivors:
    depends_on: [work]
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ tasks.work.output }}
        expression: "[ .[] | select(. != null) ] | length"
