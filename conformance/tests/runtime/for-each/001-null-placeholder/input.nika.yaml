# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: rt-foreach-null-placeholder
model: mock/echo
const:
  items: ["alpha", "BOOM", "gamma"]
tasks:
  work:
    for_each: ${{ const.items }}
    fail_fast: false
    on_error:
      recover: null
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ item != 'BOOM' }}", message: "designed per-item failure" }
  survivors:
    with:
      work: ${{ tasks.work.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.work }}
        expression: "[ .[] | select(. != null) ] | length"
