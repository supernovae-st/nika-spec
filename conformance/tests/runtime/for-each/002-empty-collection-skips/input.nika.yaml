nika: v1
workflow:
  id: rt-foreach-empty-skips
model: mock/echo
vars:
  items: []
tasks:
  work:
    for_each: ${{ vars.items }}
    infer: { prompt: "never runs" }
  reader:
    with:
      result: ${{ tasks.work.output }}
    when: ${{ with.result == null }}
    infer: { prompt: "the empty branch" }
