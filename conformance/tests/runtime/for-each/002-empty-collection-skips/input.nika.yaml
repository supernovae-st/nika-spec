nika: v1
workflow:
  id: rt-foreach-empty-skips
model: mock/echo
vars:
  items: []
tasks:
  work:
    for_each: ${{ vars.items }}
    infer: { prompt: "never runs" }
  reader:
    depends_on: [work]
    when: ${{ tasks.work.output == null }}
    infer: { prompt: "the empty branch" }
