# SPDX-License-Identifier: Apache-2.0
nika: v1
workflow:
  id: io-bool-spelling
inputs:
  verbose: { type: bool, default: false }
config:
  dry_run: { type: bool, default: false }
const:
  strict: { type: bool, value: true }
tasks:
  note:
    invoke:
      tool: "nika:log"
      args:
        message: "${{ inputs.verbose }} ${{ config.dry_run }} ${{ const.strict }}"
outputs:
  ok:
    value: ${{ tasks.note.output }}
    type: bool
