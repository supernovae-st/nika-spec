# Expected: exit 0 — null membership + comparison semantics per CEL.
# C18 · null literal comparisons + null membership.
# Spec: 04-variables: "null is a CEL literal (tasks.X.output != null is in the v0.1
# subset)". CEL semantics: null == null is TRUE; a typed value != null is TRUE.
# `null in [1,2,3]` → false (CEL membership of a non-member). These are well-typed
# (null is a first-class literal, in-list membership doesn't require same-type to
# return false in CEL). Each assert proves the exact boolean.
nika: v1
workflow:
  id: c18-null-membership-and-compare

const:
  present: 7

tasks:
  null_eq_null:
    invoke: { tool: "nika:assert", args: { condition: "${{ null == null }}", message: "null == null is true" } }
  present_ne_null:
    after:
      null_eq_null: success
    invoke: { tool: "nika:assert", args: { condition: "${{ const.present != null }}", message: "7 != null is true" } }
  null_not_in_int_list:
    after:
      present_ne_null: success
    invoke: { tool: "nika:assert", args: { condition: "${{ !(null in [1, 2, 3]) }}", message: "null not in [1,2,3]" } }
  sink:
    after:
      null_not_in_int_list: success
    invoke:
      tool: "nika:write"
      args: { path: "./out/cel/c18.json", content: { null_ok: true }, create_dirs: true }
