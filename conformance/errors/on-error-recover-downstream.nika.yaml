# Expected: exit 0 — NIKA-EXEC-001 fires internally, recovered via on_error; downstream runs.
nika: v1
workflow:
  id: onerror-recover-downstream
# SPEC 05 §on_error: recover → status success, downstream runs normally.
# KNOWN-NUANCED: recover WITH a value edge. failing task recovers; a task bound to it
# should run (recovered = success → default gate satisfied).
# Markers: 05_down.json present (downstream ran after recovery).
tasks:
  fails:
    exec:
      command: ["exit", "2"]
    on_error:
      recover: "fallback"
  down:
    with:
      fails: ${{ tasks.fails.output }}
    invoke:
      tool: nika:write
      args: { path: "./out/ctrlflow/05_down.json", content: "down-ran:${{ with.fails }}" }
