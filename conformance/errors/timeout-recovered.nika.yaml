# Expected: exit 0 — NIKA-TIMEOUT-001 fires internally, recovered via on_error.
nika: v1
workflow:
  id: e28-on-error-timeout-recover
# INTENT: timeout is catchable by on_error — recover on NIKA-TIMEOUT-001
permits:
  exec: ["sleep"]
  tools: ["nika:write"]
  fs:
    write:
      - "./out/errors/**"
tasks:
  slow_fetch:
    timeout: "1s"
    exec:
      command: ["sleep", "5"]
    on_error:
      on_codes: [NIKA-TIMEOUT-001]
      recover: "stale_fallback_data"

  write_result:
    with:
      slow_fetch: ${{ tasks.slow_fetch.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/errors/e28-result.txt"
        content: "${{ with.slow_fetch }}"
