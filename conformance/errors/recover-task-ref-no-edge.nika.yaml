# Expected: NIKA-VAR-001 at RUN — BUT this encodes an ENGINE-vs-SPEC DIVERGENCE.
# Spec 05 recover resolution (NORMATIVE): a recover ref is NOT an edge ("the
# canonical example references a fallback source with no depends_on"); a
# pending/running referent must be AWAITED to terminal state. Per spec, this
# workflow SHOULD recover with 99 (source succeeds trivially). The engine
# renders immediately against the records snapshot -> VAR-001, always.
# When the runtime implements the await, flip this header to: exit 0,
# recover-a.json == 99. Pair: recover-b-edge (WITH the edge) recovers today.
nika: v1
workflow:
  id: recover-a-noedge
tasks:
  source:
    invoke:
      tool: nika:jq
      args:
        input: { v: 99 }
        expression: ".v"
  risky:
    exec:
      command: ["exit", "1"]
    on_error:
      recover: ${{ tasks.source.output }}
  sink:
    depends_on: [risky]
    invoke:
      tool: nika:write
      args:
        path: ./out/errors/recover-a.json
        content: ${{ tasks.risky.output }}
