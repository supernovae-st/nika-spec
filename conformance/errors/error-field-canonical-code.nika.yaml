# SPDX-License-Identifier: Apache-2.0
# Expected: exit 0 — NIKA-VAR-006 fires internally at args-stage, recovered via on_error (skip); tasks.fail_var.error carries the canonical wire code (spec 05 §errors).
# C26 · does tasks.X.error (the SPEC-named surface) carry the canonical code or
# the leaked internal NIKA-1702/1703? Spec 05-errors names tasks.X.error
# explicitly as a surface that MUST carry the canonical form, not an internal code.
# `fail_var` triggers a cross-type compare (VAR-006) IN ITS ARGS (task-stage) and
# recovers via on_error.skip so its .error stays readable; downstream imports the
# record through with: (.status = terminal-observation edge · .error =
# failure-observation edge, whose pass-set includes skipped BECAUSE a skip may
# carry a preserved error) and serializes it.
# NOTE (W2): a boundary eval error (with:/when:) does NOT route through
# on_error (task → failure) — 03-dag §task states now states this law.
# The trigger must therefore stay args-stage.
nika: v1
workflow:
  id: c26-error-field-surface

vars:
  num: 42
  str: "42"

tasks:
  fail_var:
    invoke:
      tool: "nika:assert"
      args: { condition: "${{ vars.num == vars.str }}", message: "cross-type → VAR-006 at args eval" }
    on_error:
      skip: true
  capture:
    with:
      fv_status: ${{ tasks.fail_var.status }}
      fv_error: ${{ tasks.fail_var.error }}
    invoke:
      tool: "nika:write"
      args:
        path: "./out/cel/c26-error.json"
        content:
          status: "${{ with.fv_status }}"
          error_code: "${{ with.fv_error.code }}"
        create_dirs: true
