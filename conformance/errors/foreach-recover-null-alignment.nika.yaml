# Expected: exit 0 — NIKA-BUILTIN-JQ-001 fires internally on iterations 1 and 4, recovered via on_error (recover: null keeps positional alignment).
nika: v1
workflow:
  id: onerror-recover-null
# COVERS: per-iteration on_error: { recover: null } -> failed iters become null at index.
# Then a fan-in aggregator partitions good vs null (the locales pattern).
# items 0..5, indices 1 and 4 fail -> null. Assert: good count 4, null count 2.
const:
  items: [0, 1, 2, 3, 4, 5]
tasks:
  loop:
    for_each: ${{ const.items }}
    max_parallel: 3
    with: { v: "${{ item }}" }
    on_error:
      recover: null
    invoke:
      tool: nika:jq
      args:
        input: { v: "${{ with.v }}" }
        expression: "if (.v == 1 or .v == 4) then error(\"boom\") else .v end"

  partition:
    with:
      loop: ${{ tasks.loop.output }}
    invoke:
      tool: nika:jq
      args:
        input: ${{ with.loop }}
        expression: "{ total: length, good: (map(select(. != null)) | length), nulls: (map(select(. == null)) | length), good_vals: (map(select(. != null))) }"

  persist:
    with:
      partition: ${{ tasks.partition.output }}
    invoke:
      tool: nika:write
      args:
        path: "./out/fanout/13_onerror_recover_null.json"
        content: ${{ with.partition }}
        create_dirs: true
