# Expected: exit 0 — NIKA-EXEC-001 fires internally, recovered via on_error (skip: true); downstream sees status=skipped.
nika: v1
workflow:
  id: e15-on-error-skip
# INTENT: on_error.skip:true — workflow SUCCEEDS, downstream sees status=skipped
permits:
  exec: ["false"]
  tools: ["nika:write"]
  fs:
    write:
      - "./out/errors/**"
tasks:
  optional_step:
    exec:
      command: ["false"]
    on_error:
      skip: true

  check_status:
    after: { optional_step: skipped }
    invoke:
      tool: "nika:write"
      args:
        path: "./out/errors/e15-result.txt"
        content: "skipped_as_expected"
