# Expected: exit 0 — item + index bindings resolve per iteration.
nika: v1
workflow: foreach-index-binding
# COVERS: ${{ index }} 0-based positional binding aligns exactly with input order.
vars:
  items: ["zero", "one", "two", "three", "four"]
tasks:
  - id: loop
    for_each: ${{ vars.items }}
    with:
      name: ${{ item }}
      i: ${{ index }}
    invoke:
      tool: nika:jq
      args:
        input: { name: "${{ with.name }}", i: "${{ with.i }}" }
        # echo the index so we can assert .[k].i == k
        expression: "{ i: .i, name: .name }"

  - id: persist
    depends_on: [loop]
    invoke:
      tool: nika:write
      args:
        path: "./out/fanout/04_foreach_index_binding.json"
        content: ${{ tasks.loop.output }}
        create_dirs: true
