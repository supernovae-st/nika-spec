# Expected: NIKA-DAG-004 at CHECK.
nika: v1
workflow:
  id: e30-dag-recover-downstream
# INTENT: NIKA-DAG-004 — on_error.recover references a downstream task (deadlock detection)
# step_b depends on step_a, but step_a's recover references step_b
# This creates a circular dependency that the engine must reject at parse time
tasks:
  step_a:
    exec:
      command: ["exit", "1"]
    on_error:
      recover: ${{ tasks.step_b.output }}

  step_b:
    after:
      step_a: succeeded
    exec:
      command: ["echo", "downstream"]
