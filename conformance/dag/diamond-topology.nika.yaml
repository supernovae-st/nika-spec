# Expected: exit 0 — diamond fan-out/fan-in topology completes.
nika: v1
workflow:
  id: diamond-dag
# COVERS: diamond DAG A -> {B, C} -> D join. B and C run in parallel after A;
# D depends on BOTH and aggregates. Assert D's output == B+C combined over A's seed.
# (NOTE: with: uses BLOCK style — flow-mapping `{ s: ${{...}} }` collides with the ${{}} braces.)
tasks:
  a:
    invoke:
      tool: nika:jq
      args: { input: { seed: 10 }, expression: ".seed" }

  b:
    with:
      s: ${{ tasks.a.output }}
    invoke:
      tool: nika:jq
      args: { input: { s: "${{ with.s }}" }, expression: "(.s * 2)" }   # 20

  c:
    with:
      s: ${{ tasks.a.output }}
    invoke:
      tool: nika:jq
      args: { input: { s: "${{ with.s }}" }, expression: "(.s + 5)" }   # 15

  d:
    with:
      bv: ${{ tasks.b.output }}
      cv: ${{ tasks.c.output }}
    invoke:
      tool: nika:jq
      args:
        input: { b: "${{ with.bv }}", c: "${{ with.cv }}" }
        expression: "{ b: .b, c: .c, joined: (.b + .c) }"   # {20,15,35}

  persist:
    with:
      d: ${{ tasks.d.output }}
    invoke:
      tool: nika:write
      args:
        path: "./out/fanout/26_diamond_dag.json"
        content: ${{ with.d }}
        create_dirs: true
