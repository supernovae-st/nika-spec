# Expected: exit 0 — empty collection skips the for_each task; the value edge passes on skipped.
nika: v1
workflow:
  id: foreach-empty
# SPEC 03 §for_each semantics: "If the collection is empty · the task is skipped".
# A skipped for_each → a downstream VALUE edge admits (pass-set {success,skipped})
# and its binding reads defined-null. Markers: 08_iter_*.json ABSENT (no
# iterations ran); 08_after.json present with the null payload visible.
const:
  empty_list: { type: array, default: [] }
tasks:
  mapped:
    for_each: ${{ const.empty_list }}
    invoke:
      tool: nika:write
      args: { path: "./out/ctrlflow/08_iter_${{ index }}.json", content: "${{ item }}" }
  after:
    with:
      result: ${{ tasks.mapped.output }}
    invoke:
      tool: nika:write
      args: { path: "./out/ctrlflow/08_after.json", content: "after-empty-ran:${{ with.result }}" }
