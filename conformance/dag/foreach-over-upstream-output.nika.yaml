# Expected: exit 0 — for_each over an upstream task output array.
nika: v1
workflow:
  id: foreach-over-upstream-output
# COVERS: for_each over a PRIOR TASK's array output (runtime-computed collection),
# not a static vars list (spec 03 L317, L638 — the discover->summarize pattern).
# discover emits an array; map runs once per element; count must match.
tasks:
  discover:
    invoke:
      tool: nika:jq
      args:
        input: { raw: "p,q,r,s" }
        # split into an array of 4
        expression: "(.raw | split(\",\"))"

  process:
    for_each: ${{ with.discover }}
    max_parallel: 2
    with:
      discover: ${{ tasks.discover.output }}
      tok: ${{ item }}
      i: ${{ index }}
    invoke:
      tool: nika:jq
      args:
        input: { tok: "${{ with.tok }}", i: "${{ with.i }}" }
        expression: "{ i: .i, upper: (.tok | ascii_upcase) }"

  persist:
    with:
      process: ${{ tasks.process.output }}
    invoke:
      tool: nika:write
      args:
        path: "./out/fanout/32_foreach_over_upstream_output.json"
        content: ${{ with.process }}
        create_dirs: true
