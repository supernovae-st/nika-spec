# Expected: exit 0 — has() is false on defined-but-null; present-consumer skips, absent-consumer runs.
nika: v1
workflow: when-null-upstream
# COVERS: a defined-but-NULL upstream value read in when: via has() (spec 03 L165-171,L209).
# producer emits {maybe: null}; consumer_present runs when has(...) is true (it is defined but null
# -> has() returns false per spec: "true iff resolves to a defined, NON-null value").
# So has(maybe) == false -> consumer_present SKIPS, consumer_absent RUNS.
tasks:
  - id: producer
    invoke:
      tool: nika:jq
      args: { input: { maybe: null }, expression: "." }
    output:
      maybe: ".maybe"

  - id: consumer_present
    depends_on: [producer]
    when: ${{ has(tasks.producer.maybe) }}
    invoke:
      tool: nika:write
      args: { path: "./out/fanout/27_present.json", content: { branch: "present" }, create_dirs: true }

  - id: consumer_absent
    depends_on: [producer]
    when: ${{ !has(tasks.producer.maybe) }}
    invoke:
      tool: nika:write
      args: { path: "./out/fanout/27_absent.json", content: { branch: "absent" }, create_dirs: true }
