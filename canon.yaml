  count: 7
  reference: nika/engine/docs/adr/adr-037-bottom-up.md
  items: ["L0", "L0.5", "L1", "L2", "L3", "L4", "L5"]

# ---------------------------------------------------------------- steal-pattern tiers
# 4-tier triage from steal-pattern.md · A native · B port FSM · C adopt headless ·
# D defer. Public Tier 0/1/2/3 = the @spnds 3-tier sister (different domain ·
# CSS/elements/machines). Closed enum forever.
steal_pattern_tiers:
  count: 4
  reference: dx/.claude/rules/steal-pattern.md
  items:
    - { name: A, semantic: "NATIVE-FIRST · browsers ship 95%+ (popover= · <dialog> · <details>)" }
    - { name: B, semantic: "STEAL · port FSM · <2000 LOC · ≤4 algo layers · a11y <30%" }
    - { name: C, semantic: "ADOPT-AS-DEVDEP · >3000 LOC · headless+MIT/Apache" }
    - { name: D, semantic: "DEFER · >5000 LOC OR specialist (text engines)" }

# ---------------------------------------------------------------- severity
# 4-level review/finding severity per hq-hygiene + ds-discipline review canon.
# Order semantic · descending · BLOCKER halts ship · LOW = informational.
severity:
  count: 4
  reference: dx/.claude/rules/hq-hygiene.md
  items: [BLOCKER, HIGH, MED, LOW]
