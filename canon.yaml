# ---------------------------------------------------------------- schema
# Forward-compat marker · bump on breaking schema change. The projector
# refuses to run with an unknown schema_version (exit 2 · explicit upgrade
# required).
schema_version: 1

# ---------------------------------------------------------------- counts
# Top-level counts · derived from items[] length below · stated here for
# fast grep-based projection checks (the projector reads `count:` lines).
counts:
  verbs: 4
  builtins: 22
  providers: 13
  extract_modes: 9
  error_namespaces: 14
  pillars: 5
  # ---- extended v0.2 · 2026-05-27 · lifecycle + diamond + steal + severity
  lifecycle_product: 4
  lifecycle_decision: 4
  lifecycle_risk: 4
  diamond_layers: 7
  steal_pattern_tiers: 4
  severity: 4

# ---------------------------------------------------------------- verbs
# D-2026-05-22-N18 · "the count is 4, absolute · immutable forever".
# A verb = a distinct native execution model · fetch is NOT a verb (it is the
# nika:fetch builtin reached via invoke:). spec/02-verbs.md is the prose home.
verbs:
  count: 4
  immutable: true
  reference: spec/02-verbs.md
  items:
    - { name: infer,  semantic: "LLM generation · structured output · vision · thinking" }
    - { name: exec,   semantic: "Shell command · blocklist · streaming" }
    - { name: invoke, semantic: "MCP tool call OR builtin (incl. nika:fetch)" }
    - { name: agent,  semantic: "Multi-turn agentic loop · tool calling · guardrails" }

