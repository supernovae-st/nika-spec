# ---------------------------------------------------------------- diamond layers
# 7 layers in the Diamond bottom-up admission DAG (ADR-037 + ADR-006 amendment).
# L0 foundation · L0.5 traits-only · L1 satellites · L2 orchestrators ·
# L3 verbs · L4 consumers · L5 top apps. Order semantic · monotonic.
